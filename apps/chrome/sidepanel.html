<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Owletto</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        background: #0a0a0a;
        color: #f5f5f5;
        font: 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        display: flex;
        flex-direction: column;
      }
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 6px 12px;
        border-bottom: 1px solid #1a1a1a;
        font-size: 12px;
        color: #a3a3a3;
        flex-shrink: 0;
      }
      .topbar a {
        color: #a3a3a3;
        text-decoration: none;
      }
      .topbar a:hover {
        color: #f5f5f5;
      }
      .body {
        flex: 1;
        position: relative;
        min-height: 0;
      }
      iframe {
        border: 0;
        width: 100%;
        height: 100%;
        display: block;
      }
      .gate {
        padding: 24px;
      }
      .gate h1 {
        font-size: 16px;
        margin: 0 0 8px;
      }
      .gate p {
        margin: 0;
        color: #a3a3a3;
        line-height: 1.5;
      }
      .gate button {
        margin-top: 16px;
        background: #f5f5f5;
        color: #0a0a0a;
        border: 0;
        padding: 8px 14px;
        border-radius: 6px;
        font-weight: 500;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <span id="status-label">Owletto</span>
      <a href="#" id="manage-permissions">Permissions</a>
    </div>
    <div class="body">
      <div id="gate" class="gate" hidden>
        <h1>Not connected</h1>
        <p>This Chrome profile is not paired to Owletto yet.</p>
        <button id="pair">Pair this profile</button>
      </div>
      <iframe id="app" hidden></iframe>
    </div>
    <script src="sidepanel.js" type="module"></script>
  </body>
</html>
