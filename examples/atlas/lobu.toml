# lobu.toml — Atlas reference catalog
# Docs: https://lobu.ai/docs/getting-started
#
# Atlas is a public, slow-churn reference catalog: countries, cities,
# regions, industries, technologies, universities. Other public catalogs
# (market, future siblings) reference these via cross-org relationships.

[agents.atlas-curator]
name = "atlas-curator"
description = "Curate Atlas reference data — countries, cities, regions, industries, technologies, universities"
dir = "./agents/atlas-curator"

[[agents.atlas-curator.providers]]
id = "z-ai"
model = "z-ai/glm-4.7"
key = "$Z_AI_API_KEY"


[agents.atlas-curator.network]
allowed = ["github.com", ".github.com", ".githubusercontent.com", "api.z.ai", ".z.ai"]

[memory]
enabled = true
org = "atlas"
name = "Atlas"
description = "Public reference catalog — places, taxonomies, institutions"
models = "./models"
data = "./data"
