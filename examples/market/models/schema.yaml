version: 2
entities:
  - slug: company
    name: Company
    description: Portfolio company or deal pipeline company
    icon: building
    color: '#2563eb'
    metadata_schema:
      type: object
      properties:
        market:
          type: string
          x-table-column: true
          x-table-label: Market
        sector:
          type: string
          enum:
            - bio-health
            - ai
            - fintech
            - crypto
            - consumer
          x-table-column: true
          x-table-label: Sector
        category:
          type: string
          enum:
            - portfolio
            - recruiter
            - prospect
          x-table-column: true
          x-table-label: Category
        location:
          type: string
          x-table-column: true
          x-table-label: Location
        domain:
          type: string
          description: Normalized company domain used by identity-engine hosted_domain facts
          x-identity-namespace:
            namespace: hosted_domain
            normalize: lowercase
          x-table-column: true
          x-table-label: Domain
        one_liner:
          type: string
        team_size:
          type: integer
        founding_year:
          type: integer
        funding_raised:
          type: string
        valuation:
          type: string
        revenue:
          type: string
        growth_rate:
          type: string
        traction_score:
          type: number
        thesis:
          type: string
        stage:
          type: string
          enum:
            - idea
            - pre-seed
            - seed
            - series-a
            - series-b
            - series-c
            - growth
            - public
        linkedin_url:
          type: string
          format: uri
        logo_url:
          type: string
          format: uri
          description: Brand logo URL
        tagline:
          type: string
          description: One-line brand tagline
        brand_voice:
          type: string
          description: Brand voice / tone-of-voice notes
        social_handles:
          type: object
          description: Brand social handles by platform (twitter, linkedin, github, …)
          properties:
            twitter:
              type: string
            linkedin:
              type: string
            github:
              type: string
            youtube:
              type: string
            instagram:
              type: string
            tiktok:
              type: string
          additionalProperties:
            type: string
  - slug: founder
    name: Founder
    description: Company founder or co-founder
    icon: user
    color: '#7c3aed'
    metadata_schema:
      type: object
      properties:
        role:
          type: string
          x-table-column: true
          x-table-label: Role
        sector:
          type: string
          enum:
            - bio-health
            - ai
            - fintech
            - crypto
            - consumer
          x-table-column: true
          x-table-label: Sector
        location:
          type: string
          x-table-column: true
          x-table-label: Location
        specialties:
          type: array
          items:
            type: string
          x-table-column: true
          x-table-label: Specialties
        background:
          type: string
        linkedin_url:
          type: string
          format: uri
        twitter_handle:
          type: string
        education:
          type: string
        career_history:
          type: array
          items:
            type: object
            properties:
              title:
                type: string
              company:
                type: string
              start:
                type: string
              end:
                type: string
        notable_exits:
          type: array
          items:
            type: string
        provenance:
          type: string
          enum:
            - inbound
            - outbound
            - referral
            - event
            - portfolio
    x-table-relationships:
      - label: Owner
        direction: outbound
        relationship_type: primary_relationship_owner
      - label: Company
        direction: outbound
        relationship_type: works_at
  - slug: fund-round
    name: Fund Round
    description: Investment round (seed, series A, etc.)
    icon: dollar-sign
    color: '#10b981'
    metadata_schema:
      type: object
      properties:
        round_type:
          type: string
          enum:
            - preseed
            - seed
            - series_a
            - series_b
            - series_c
            - series_d
            - growth
            - ipo
          x-table-column: true
          x-table-label: Round Type
        amount_usd:
          type: number
          x-table-column: true
          x-table-label: Amount (USD)
        date:
          type: string
          format: date
          x-table-column: true
          x-table-label: Date
        lead_investor_slug:
          type: string
          x-table-column: true
          x-table-label: Lead Investor
          x-link-entity-type: investor
          x-link-lookup-field: slug
        post_money_usd:
          type: number
        participants:
          type: array
          items:
            type: string
  - slug: investor
    name: Investor
    description: VC firm, angel investor, or fund
    icon: banknote
    color: '#059669'
    metadata_schema:
      type: object
      properties:
        investor_type:
          type: string
          enum:
            - vc_firm
            - angel
            - corporate
            - accelerator
            - family_office
            - partner
          x-table-column: true
          x-table-label: Type
        sector_focus:
          type: array
          items:
            type: string
          x-table-column: true
          x-table-label: Sector Focus
        website:
          type: string
          format: uri
          x-table-column: true
          x-table-label: Website
        sector:
          type: string
          enum:
            - bio-health
            - ai
            - fintech
            - crypto
            - consumer
          x-table-column: true
          x-table-label: Sector
        bio:
          type: string
        fund_size:
          type: string
        stage_focus:
          type: array
          items:
            type: string
        linkedin_url:
          type: string
          format: uri
        portfolio_url:
          type: string
          format: uri
        typical_check_size:
          type: string
  - slug: job-posting
    name: Job Posting
    description: Open role at a market.company
    icon: briefcase
    color: '#f59e0b'
    metadata_schema:
      type: object
      oneOf:
        - required:
            - posted_by_founder_id
          not:
            required:
              - posted_by_member_id
        - required:
            - posted_by_member_id
          not:
            required:
              - posted_by_founder_id
      properties:
        role:
          type: string
          x-table-column: true
          x-table-label: Role
        title:
          type: string
          x-table-column: true
          x-table-label: Title
        company_id:
          type: integer
          description: FK to market.company
          x-table-column: true
          x-table-label: Company
          x-link-entity-type: company
        posted_by_founder_id:
          type: integer
          description: FK to market.founder if posted by a verified founder
          x-link-entity-type: founder
        posted_by_member_id:
          type: integer
          description: FK to market.$member if posted by an authorized member who isn't a founder
          x-link-entity-type: $member
        city_id:
          type: integer
          description: FK to atlas.city (cross-org reference, optional)
          x-table-column: true
          x-table-label: City
        description:
          type: string
        status:
          type: string
          enum:
            - open
            - filled
            - closed
          x-table-column: true
          x-table-label: Status
        posted_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
  - slug: product
    name: Product
    description: Company product tracked for reviews and market signals
    icon: box
    color: '#3B82F6'
    metadata_schema:
      type: object
      properties:
        tagline:
          type: string
          x-table-column: true
          x-table-label: Tagline
        target_audience:
          type: string
          x-table-column: true
          x-table-label: Target Audience
        value_proposition:
          type: string
          x-table-column: true
          x-table-label: Value Proposition
        key_features:
          type: array
          items:
            type: string
        differentiators:
          type: string
  - slug: sector
    name: Sector
    description: Investment thesis / practice area
    icon: chart-line
    color: '#6366f1'
    metadata_schema:
      type: object
      properties:
        sector_key:
          type: string
          enum:
            - bio-health
            - ai
            - fintech
            - crypto
            - consumer
          x-table-column: true
          x-table-label: Sector Key
        description:
          type: string
          x-table-column: true
          x-table-label: Description
        lead_partner_slug:
          type: string
          x-table-column: true
          x-table-label: Lead Partner
          x-link-entity-type: investor
          x-link-lookup-field: slug
        color:
          type: string
relationships:
  - slug: educated_at
    name: Educated At
    description: Founder was educated at a university (cross-org reference into atlas.university)
    rules:
      - source: founder
        target: university
    metadata_schema:
      type: object
      properties:
        degree:
          type: string
        field:
          type: string
        start_year:
          type: integer
        end_year:
          type: integer
  - slug: founded_by
    name: Founded By
    description: Company was founded by this person
    metadata_schema:
      type: object
      properties:
        equity_pct:
          type: number
        founding_date:
          type: string
          format: date
  - slug: headquartered_in
    name: Headquartered In
    description: Company is headquartered in a city (cross-org reference into atlas.city)
    rules:
      - source: company
        target: city
    metadata_schema:
      type: object
      properties:
        since:
          type: string
          format: date
        address:
          type: string
  - slug: in_industry
    name: In Industry
    description: Company is in an industry (cross-org reference into atlas.industry)
    rules:
      - source: company
        target: industry
    metadata_schema:
      type: object
      properties:
        primary:
          type: boolean
          description: Whether this is the company's primary industry classification
  - slug: in_sector
    name: In Sector
  - slug: invested_in
    name: Invested In
    description: Investor has invested in this company
    metadata_schema:
      type: object
      properties:
        round:
          type: string
        amount:
          type: number
        lead:
          type: boolean
        date:
          type: string
          format: date
  - slug: mentions
    name: Mentions
    description: Loose reference — one entity is mentioned in the context of another
    metadata_schema:
      type: object
      properties:
        confidence:
          type: number
          description: Optional 0-1 confidence in the mention
        source:
          type: string
          description: Where the mention was observed
  - slug: operates_in
    name: Operates In
    description: Company operates in a country or region (cross-org reference into atlas.country or atlas.region)
    rules:
      - source: company
        target: country
      - source: company
        target: region
    metadata_schema:
      type: object
      properties:
        since:
          type: string
          format: date
        primary:
          type: boolean
          description: Whether this is the company's primary operating geography
  - slug: previously_at
    name: Previously At
  - slug: primary_relationship_owner
    name: Primary Relationship Owner
  - slug: round_led_by
    name: Round Led By
  - slug: round_of
    name: Round Of
  - slug: sourced_by
    name: Sourced By
  - slug: uses_technology
    name: Uses Technology
    description: Company uses a technology in its stack (cross-org reference into atlas.technology)
    rules:
      - source: company
        target: technology
    metadata_schema:
      type: object
      properties:
        role:
          type: string
          description: How the technology is used (e.g. primary database, observability, frontend framework)
        since:
          type: string
          format: date
  - slug: works_at
    name: Works At
    rules:
      - source: $member
        target: company
      - source: founder
        target: company
    auto_create_when:
      - sourceNamespace: hosted_domain
        targetField: domain
        assuranceRequired: oauth_verified
        matchStrategy: unique_only
watchers:
  - slug: founder-activity-tracker
    agent: vc-tracking
    name: Founder Activity Tracker
    schedule: 0 10 * * *
    notification_priority: normal
    tags: [vc, founders, daily]
    min_cooldown_seconds: 600
    reaction_script: ./reactions/founder-activity-tracker.reaction.ts
    prompt: |
      You are a venture capital analyst tracking the public activity of startup founders in your portfolio.

      ## Founders
      {{#each entities}}
      - {{name}} ({{entity_type}}, ID: {{id}})
      {{/each}}

      ## Recent Founder Activity
      {{#if sources.founder_posts}}
      {{sources.founder_posts}}
      {{/if}}

      ---

      Produce a structured founder activity report:
      1. **Executive Summary**: 2-3 sentence overview of founder activity and signals.
      2. **Per-Founder Analysis**: For each active founder, summarize their messaging themes, engagement level, and signals about company direction.
      3. **Cross-Portfolio Patterns**: Themes multiple founders discuss.
      4. **Notable Signals**: Flag potential announcements, strategic shifts, or concerns.

      Be specific and cite actual tweets/posts as evidence.
    extraction_schema:
      type: object
      required:
        - summary
        - founders
        - notable_signals
      properties:
        summary:
          type: string
        founders:
          type: array
          items:
            type: object
            required:
              - name
              - company
              - activity_level
              - themes
            properties:
              name:
                type: string
              company:
                type: string
              activity_level:
                type: string
                enum:
                  - high
                  - medium
                  - low
                  - inactive
              themes:
                type: array
                items:
                  type: string
              sentiment:
                type: string
                enum:
                  - bullish
                  - neutral
                  - cautious
                  - concerned
              signals:
                type: array
                items:
                  type: string
              notable_posts:
                type: array
                items:
                  type: string
        cross_patterns:
          type: array
          items:
            type: object
            properties:
              theme:
                type: string
              founders_involved:
                type: array
                items:
                  type: string
        notable_signals:
          type: array
          items:
            type: object
            required:
              - signal
              - founder
              - impact
            properties:
              signal:
                type: string
              founder:
                type: string
              impact:
                type: string
                enum:
                  - high
                  - medium
                  - low
    sources:
      - name: founder_posts
        query: |
          SELECT id, title, payload_text, author_name, source_url, occurred_at, score, origin_type, connector_key FROM events WHERE connector_key IN ('x') AND origin_type IN ('tweet', 'reply') ORDER BY occurred_at DESC LIMIT 300
    reactions_guidance: |
      When a founder signals hiring activity, fundraising, or pivots, flag for the investment team.
      Track founders going quiet as a potential concern.
      Alert on any public statements about competitors or market conditions.
  - slug: opportunity-matcher
    agent: vc-tracking
    name: Opportunity Matcher
    schedule: 0 */12 * * *
    notification_priority: normal
    tags: [vc, matching]
    min_cooldown_seconds: 600
    prompt: |
      You are a community intelligence agent for a private founder community managed by a venture capital fund.
      Your job is to monitor founder activity and identify high-quality introduction opportunities between portfolio founders.

      ## Community Members
      {{#each entities}}
      **{{name}}** ({{entity_type}})
      {{#if metadata.title}} — {{metadata.title}}{{/if}}
      {{#if metadata.role}} — {{metadata.role}}{{/if}}
      {{/each}}

      ## Recent Activity
      {{#if sources.content}}
      {{sources.content}}
      {{/if}}

      ## Instructions
      1. Scan all new content for signals: launches, posts, hiring announcements, funding news, project updates, and collaboration signals.
      2. For each signal, identify which other community founders are likely to care and explain why.
      3. Suggest a concrete action: warm intro draft, shared-interest notification, or flagging for community ops review.
      4. Only suggest introductions where there is a clear, specific overlap — not generic "both work in tech" matches.
      5. Rate each signal's strength (high/medium/low) based on timeliness and relevance.
    extraction_schema:
      type: object
      required:
        - signals
        - intro_recommendations
        - summary
      properties:
        signals:
          type: array
          items:
            type: object
            required:
              - type
              - source
              - summary
              - strength
              - related_topics
              - interested_members
              - reason
              - suggested_action
            properties:
              type:
                type: string
              source:
                type: string
              summary:
                type: string
              strength:
                type: string
                enum:
                  - high
                  - medium
                  - low
              related_topics:
                type: array
                items:
                  type: string
              interested_members:
                type: array
                items:
                  type: string
              reason:
                type: string
              suggested_action:
                type: string
        intro_recommendations:
          type: array
          items:
            type: object
            required:
              - member_a
              - member_b
              - overlap
              - confidence
            properties:
              member_a:
                type: string
              member_b:
                type: string
              overlap:
                type: string
              draft_intro:
                type: string
              confidence:
                type: string
                enum:
                  - high
                  - medium
        summary:
          type: string
    sources:
      - name: content
        query: |
          SELECT id, title, payload_text, author_name, source_url, occurred_at, score, origin_type, connector_key FROM events WHERE entity_id IN (SELECT id FROM entities WHERE entity_type = 'founder') ORDER BY occurred_at DESC LIMIT 300
