version: 2
entities:
  - slug: blocker
    name: Blocker
    description: A dependency or issue that is blocking project progress
    icon: ban
    color: '#EF4444'
    metadata_schema:
      type: object
      properties:
        blocker_description:
          type: string
          x-table-label: Blocker
          x-table-column: true
        owned_by:
          type: string
          x-table-label: Owner
          x-table-column: true
        impact:
          type: string
          x-table-label: Impact
          x-table-column: true
        status:
          type: string
          x-table-label: Status
          x-table-column: true
  - slug: document
    name: Document
    description: A project artifact, review, or reference document
    icon: file-text
    color: '#F59E0B'
    metadata_schema:
      type: object
      properties:
        document_name:
          type: string
          x-table-label: Document
          x-table-column: true
        document_type:
          type: string
          x-table-label: Type
          x-table-column: true
        linked_project:
          type: string
          x-table-label: Project
          x-table-column: true
        last_updated:
          type: string
          x-table-label: Updated
          x-table-column: true
  - slug: milestone
    name: Milestone
    description: A key deliverable or phase gate within a project
    icon: flag
    color: '#10B981'
    metadata_schema:
      type: object
      properties:
        milestone_name:
          type: string
          x-table-label: Milestone
          x-table-column: true
        lifecycle_state:
          type: string
          x-table-label: State
          x-table-column: true
        target_date:
          type: string
          x-table-label: Target Date
          x-table-column: true
        parent_project:
          type: string
          x-table-label: Project
          x-table-column: true
  - slug: stakeholder
    name: Stakeholder
    description: A person who owns or is responsible for part of a project
    icon: user
    color: '#8B5CF6'
    metadata_schema:
      type: object
      properties:
        name:
          type: string
          x-table-label: Name
          x-table-column: true
        role:
          type: string
          x-table-label: Role
          x-table-column: true
        owns:
          type: string
          x-table-label: Owns
          x-table-column: true
        contact:
          type: string
          x-table-label: Contact
relationships:
  - slug: blocked-by
    name: Blocked By
    description: Tie blockers directly to the project and milestone they threaten.
  - slug: documented-in
    name: Documented In
    description: Preserve the source documents and reviews behind key project state.
  - slug: owned-by
    name: Owned By
    description: Keep project ownership queryable across updates and artifacts.
watchers:
  - slug: phoenix-rollout-tracker
    name: Phoenix rollout tracker
    schedule: 0 9 * * 1
    prompt: |
      Check project blockers, milestone progress, and generate the weekly risk summary for leadership.
    extraction_schema:
      type: object
      required:
        - blockers_resolved
        - milestone_state
        - new_risks
        - risk_summary
      properties:
        blockers_resolved:
          type: array
          items:
            type: string
        milestone_state:
          type: string
        new_risks:
          type: array
          items:
            type: string
        risk_summary:
          type: string
