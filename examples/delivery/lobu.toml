# lobu.toml — Agent configuration
# Docs: https://lobu.ai/docs/getting-started

[agents.delivery]
name = "delivery"
description = "Help delivery teams keep milestones, blockers, owners, and artifacts aligned"
dir = "./agents/delivery"

[[agents.delivery.providers]]
id = "anthropic"
model = "claude/sonnet-4-5"
key = "$ANTHROPIC_API_KEY"


[agents.delivery.network]
allowed = ["github.com", ".github.com", ".githubusercontent.com", "registry.npmjs.org", ".npmjs.org"]

[memory]
enabled = true
org = "delivery"
name = "Delivery"
description = "Help delivery teams keep milestones, blockers, owners, and artifacts aligned"
models = "./models"
data = "./data"
