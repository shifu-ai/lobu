# lobu.toml — Agent configuration
# Docs: https://lobu.ai/docs/getting-started

[agents.sales]
name = "sales"
description = "Help revenue teams track account health, rollout progress, and renewal signals"
dir = "./agents/sales"

[[agents.sales.providers]]
id = "anthropic"
model = "claude/sonnet-4-5"
key = "$ANTHROPIC_API_KEY"


[agents.sales.network]
allowed = ["github.com", ".github.com", ".githubusercontent.com", "registry.npmjs.org", ".npmjs.org"]

[memory.lobu]
enabled = true
org = "sales"
name = "Sales"
description = "Help revenue teams track account health, rollout progress, and renewal signals"
models = "./models"
data = "./data"
