version: 1
type: entity
slug: goal
name: Goal
description: A personal financial goal (emergency fund, deposit, retirement target, etc.).
icon: target
color: "#EC4899"
metadata_schema:
  type: object
  required:
    - name
    - target_amount
    - category
  properties:
    name:
      type: string
      x-table-label: Goal
      x-table-column: true
    target_amount:
      type: string
      description: Decimal GBP
      x-table-label: Target
      x-table-column: true
    target_date:
      type: string
      format: date
      x-table-label: By
      x-table-column: true
    category:
      type: string
      enum:
        - emergency_fund
        - deposit
        - retirement
        - debt_payoff
        - other
      x-table-label: Category
      x-table-column: true
    current_amount:
      type: string
      description: Optional snapshot, decimal GBP
