version: 1
type: entity
slug: account
name: Account
description: A bank, savings, brokerage, pension, mortgage, or business account. Owner is always set via the owned_by relationship (or co_owned_by for joint accounts) — never inferred from context.
icon: wallet
color: "#3B82F6"
metadata_schema:
  type: object
  required:
    - provider
    - wrapper
  properties:
    provider:
      type: string
      description: Bank or broker name (e.g. "Monzo", "Hargreaves Lansdown")
      x-table-label: Provider
      x-table-column: true
    wrapper:
      type: string
      enum:
        - current
        - savings
        - business_current
        - business_savings
        - ISA
        - LISA
        - JISA
        - SIPP
        - workplace_pension
        - GIA
        - mortgage
        - credit_card
        - loan
        - other
      description: Account class. Drives tax treatment (ISA = no SA reporting, GIA = CGT applies, etc.).
      x-table-label: Wrapper
      x-table-column: true
    currency:
      type: string
      description: ISO 4217 currency code
      default: GBP
      x-table-label: Ccy
      x-table-column: true
    account_number_last4:
      type: string
      description: Last 4 digits, for matching against statements
    sort_code:
      type: string
    iban:
      type: string
      description: For non-UK accounts; preferred over sort_code+account_number when known
    opening_balance:
      type: string
      description: Decimal string, e.g. "1234.56"
    closing_balance:
      type: string
    notes:
      type: string
