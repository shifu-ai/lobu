version: 1
type: entity
slug: document
name: Document
description: A source document — P60, P45, P11D, SA302, broker contract note, mortgage statement, bank statement — that other entities are parsed from.
icon: file-text
color: "#6B7280"
metadata_schema:
  type: object
  required:
    - doc_type
    - source
  properties:
    doc_type:
      type: string
      enum:
        - P60
        - P45
        - P11D
        - SA302
        - bank_statement
        - savings_statement
        - broker_statement
        - contract_note
        - dividend_voucher
        - mortgage_statement
        - rental_agreement
        - receipt
        - other
      x-table-label: Type
      x-table-column: true
    source:
      type: string
      enum:
        - gmail
        - whatsapp_upload
        - manual
      x-table-label: Source
      x-table-column: true
    download_url:
      type: string
      format: uri
      description: Signed gateway artifact URL
    payer_or_employer:
      type: string
      description: Counterparty named on the document
    captured_at:
      type: string
      format: date-time
