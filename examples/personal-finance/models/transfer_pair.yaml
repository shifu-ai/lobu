version: 1
type: relationship
slug: transfer_pair
name: Transfer Pair
description: Two transactions are the two legs of an internal transfer between accounts the same subject (or related subjects) controls. Symmetric. When this link exists, neither side counts as taxable income or as an allowable expense.
metadata_schema:
  type: object
  properties:
    direction:
      type: string
      enum: [outbound, inbound]
      description: Which leg this row represents — outbound (debit on source) or inbound (credit on destination)
