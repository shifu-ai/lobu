version: 1
type: entity
slug: holding
name: Holding
description: A current security position in a brokerage account.
icon: trending-up
color: "#8B5CF6"
metadata_schema:
  type: object
  required:
    - ticker
    - quantity
    - as_of_date
  properties:
    ticker:
      type: string
      x-table-label: Ticker
      x-table-column: true
    isin:
      type: string
    quantity:
      type: string
      description: Decimal string
      x-table-label: Quantity
      x-table-column: true
    avg_cost:
      type: string
      description: Average cost per unit (s.104 pool), decimal string
    currency:
      type: string
      default: GBP
    as_of_date:
      type: string
      format: date
      x-table-label: As of
      x-table-column: true
