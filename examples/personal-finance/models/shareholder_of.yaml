version: 1
type: relationship
slug: shareholder_of
name: Shareholder Of
description: A person or company holds shares in a company. Source can be either $member or company (companies can own other companies).
metadata_schema:
  type: object
  properties:
    share_class:
      type: string
      description: e.g. "ordinary", "A ordinary", "preference"
    shareholding_pct:
      type: number
      minimum: 0
      maximum: 100
    shares_held:
      type: integer
      description: Number of shares (alternative to percentage when share count is known)
    acquired_date:
      type: string
      format: date
