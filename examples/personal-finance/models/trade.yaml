version: 1
type: entity
slug: trade
name: Trade
description: A self-employment business for SA103 reporting.
icon: store
color: "#0D9488"
metadata_schema:
  type: object
  required:
    - name
  properties:
    name:
      type: string
      x-table-label: Trade
      x-table-column: true
    description:
      type: string
    accounting_period_start:
      type: string
      format: date
    accounting_period_end:
      type: string
      format: date
    cash_basis_flag:
      type: boolean
      default: true
      description: Cash basis (true) vs accruals (false)
    simplified_expenses_flag:
      type: boolean
      default: false
