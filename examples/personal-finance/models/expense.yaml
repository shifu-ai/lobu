version: 1
type: entity
slug: expense
name: Expense
description: An allowable expense against a trade or property.
icon: receipt
color: "#DC2626"
metadata_schema:
  type: object
  required:
    - category
    - amount
    - date
  properties:
    category:
      type: string
      enum:
        - cost_of_goods
        - travel
        - premises
        - repairs
        - admin
        - advertising
        - interest_finance
        - professional_fees
        - wages
        - utilities
        - insurance
        - agent_fees
        - other
      x-table-label: Category
      x-table-column: true
    amount:
      type: string
      description: Decimal GBP
      x-table-label: Amount
      x-table-column: true
    date:
      type: string
      format: date
      x-table-label: Date
      x-table-column: true
    notes:
      type: string
    is_capital:
      type: boolean
      default: false
      description: Capital vs revenue (capital expenses go to capital_allowances, not expenses)
