version: 1
type: relationship
slug: employee_of
name: Employee Of
description: A person is employed by a company. Replaces the older `employed_by` indirection through `income_source` for direct subject-to-subject employment facts.
metadata_schema:
  type: object
  properties:
    employment_start:
      type: string
      format: date
    employment_end:
      type: string
      format: date
      description: From P45 if the employment ended in this tax year
    paye_reference:
      type: string
      description: PAYE reference assigned by the employer (e.g. "123/AB456")
    role:
      type: string
