version: 1
type: entity
slug: asset_lot
name: Asset Lot
description: An acquisition lot used for s.104 share-pool / matching rules. One lot per buy event.
icon: layers
color: "#A78BFA"
metadata_schema:
  type: object
  required:
    - acquisition_date
    - quantity
    - cost_basis
  properties:
    pool_id:
      type: string
      description: Identifier for the s.104 pool (typically the ticker/ISIN)
      x-table-label: Pool
      x-table-column: true
    acquisition_date:
      type: string
      format: date
      x-table-label: Acquired
      x-table-column: true
    quantity:
      type: string
      x-table-label: Quantity
      x-table-column: true
    cost_basis:
      type: string
      description: Total cost for this lot, decimal GBP
      x-table-label: Cost
      x-table-column: true
    quantity_remaining:
      type: string
      description: After partial disposals
