version: 1
type: entity
slug: contribution
name: Contribution
description: A pension or charitable contribution affecting tax (Gift Aid, SIPP, etc.).
icon: piggy-bank
color: "#7C3AED"
metadata_schema:
  type: object
  required:
    - scheme
    - mechanism
    - amount
    - date
  properties:
    scheme:
      type: string
      description: Provider/charity name
      x-table-label: Scheme
      x-table-column: true
    mechanism:
      type: string
      enum:
        - relief_at_source
        - net_pay
        - salary_sacrifice
        - gift_aid
      description: Pension relief mechanism, or gift_aid for charitable donations
      x-table-label: Mechanism
      x-table-column: true
    amount:
      type: string
      description: Net amount paid, decimal GBP
      x-table-label: Amount
      x-table-column: true
    date:
      type: string
      format: date
      x-table-label: Date
      x-table-column: true
    carry_back_to_prior_year:
      type: boolean
      default: false
      description: Gift Aid carry-back election
