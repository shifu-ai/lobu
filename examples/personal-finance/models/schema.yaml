version: 2
entities:
  - slug: account
    name: Account
    description: A bank, savings, brokerage, pension, mortgage, or business account. Owner is always set via the owned_by relationship (or co_owned_by for joint accounts) — never inferred from context.
    icon: wallet
    color: '#3B82F6'
    metadata_schema:
      type: object
      required:
        - provider
        - wrapper
      properties:
        provider:
          type: string
          description: Bank or broker name (e.g. "Monzo", "Hargreaves Lansdown")
          x-table-label: Provider
          x-table-column: true
        wrapper:
          type: string
          enum:
            - current
            - savings
            - business_current
            - business_savings
            - ISA
            - LISA
            - JISA
            - SIPP
            - workplace_pension
            - GIA
            - mortgage
            - credit_card
            - loan
            - other
          description: Account class. Drives tax treatment (ISA = no SA reporting, GIA = CGT applies, etc.).
          x-table-label: Wrapper
          x-table-column: true
        currency:
          type: string
          description: ISO 4217 currency code
          default: GBP
          x-table-label: Ccy
          x-table-column: true
        account_number_last4:
          type: string
          description: Last 4 digits, for matching against statements
        sort_code:
          type: string
        iban:
          type: string
          description: For non-UK accounts; preferred over sort_code+account_number when known
        opening_balance:
          type: string
          description: Decimal string, e.g. "1234.56"
        closing_balance:
          type: string
        notes:
          type: string
  - slug: allowance_window
    name: Allowance Window
    description: A materialized accumulator for one tax allowance over one tax year. Lets the agent answer "how much ISA budget left this year?" or "how much pension annual allowance can I still use?" instantly without recomputing across all underlying transactions/contributions every time.
    icon: gauge
    color: '#84CC16'
    metadata_schema:
      type: object
      required:
        - kind
        - cap
        - used
      properties:
        kind:
          type: string
          enum:
            - isa_subscription
            - dividend_allowance
            - personal_savings_allowance
            - cgt_annual_exempt
            - pension_annual_allowance
            - property_income_allowance
            - trading_allowance
            - personal_allowance
          description: Which HMRC-defined allowance this window tracks
          x-table-label: Allowance
          x-table-column: true
        cap:
          type: string
          description: Decimal GBP. The statutory limit for this allowance in this year (e.g. "20000" for ISA, "60000" for pension AA).
          x-table-label: Cap
          x-table-column: true
        used:
          type: string
          description: Decimal GBP consumed so far. Updated on every relevant transaction/contribution write.
          x-table-label: Used
          x-table-column: true
        remaining:
          type: string
          description: Decimal GBP. cap minus used minus carry_forward used. May go negative if a tapered allowance applies (the agent surfaces this).
          x-table-label: Remaining
          x-table-column: true
        carry_forward_in:
          type: string
          description: For pension AA — unused allowance carried in from the prior 3 years.
        carry_forward_out:
          type: string
          description: Unused this year, available to carry forward (subject to the allowance's rules).
        last_recomputed_at:
          type: string
          format: date-time
          description: When the agent last recomputed used/remaining from underlying entities.
  - slug: asset_lot
    name: Asset Lot
    description: An acquisition lot used for s.104 share-pool / matching rules. One lot per buy event.
    icon: layers
    color: '#A78BFA'
    metadata_schema:
      type: object
      required:
        - acquisition_date
        - quantity
        - cost_basis
      properties:
        pool_id:
          type: string
          description: Identifier for the s.104 pool (typically the ticker/ISIN)
          x-table-label: Pool
          x-table-column: true
        acquisition_date:
          type: string
          format: date
          x-table-label: Acquired
          x-table-column: true
        quantity:
          type: string
          x-table-label: Quantity
          x-table-column: true
        cost_basis:
          type: string
          description: Total cost for this lot, decimal GBP
          x-table-label: Cost
          x-table-column: true
        quantity_remaining:
          type: string
          description: After partial disposals
  - slug: cgt_event
    name: CGT Event
    description: A capital-gains disposal — sale, gift, or other event triggering CGT (SA108).
    icon: scissors
    color: '#F59E0B'
    metadata_schema:
      type: object
      required:
        - asset_description
        - asset_class
        - disposal_date
        - disposal_proceeds
      properties:
        asset_description:
          type: string
          x-table-label: Asset
          x-table-column: true
        asset_class:
          type: string
          enum:
            - listed_shares
            - unlisted_shares
            - residential_property
            - other_property
            - crypto
            - other
          x-table-label: Class
          x-table-column: true
        acquisition_date:
          type: string
          format: date
        acquisition_cost:
          type: string
          description: Total acquisition cost, decimal string GBP
        disposal_date:
          type: string
          format: date
          x-table-label: Disposal
          x-table-column: true
        disposal_proceeds:
          type: string
          description: Total proceeds, decimal string GBP
          x-table-label: Proceeds
          x-table-column: true
        incidental_costs:
          type: string
          description: Legal, broker, SDLT on acquisition, enhancement
        relief_claimed:
          type: string
          enum:
            - none
            - PRR
            - BADR
            - investors_relief
            - gift_holdover
            - EIS_deferral
            - SEIS_deferral
          default: none
          x-table-label: Relief
          x-table-column: true
        residential_60day_return_ref:
          type: string
          description: HMRC reference if a 60-day residential CGT return was already filed
  - slug: company
    name: Company
    description: A legal entity that can hold accounts, file tax returns, employ people, or be owned. Covers Ltd, PLC, LLP, sole-trader, partnership, trust, and charity. Discriminate by company_type.
    icon: building
    color: '#0EA5E9'
    metadata_schema:
      type: object
      required:
        - legal_name
        - company_type
      not:
        anyOf:
          - required:
              - hmrc_utr
          - required:
              - hmrc_paye_reference
          - required:
              - companies_house_number
          - required:
              - vat_number
          - required:
              - hmrc_ni_number
      properties:
        legal_name:
          type: string
          x-table-label: Name
          x-table-column: true
        company_type:
          type: string
          enum:
            - ltd
            - plc
            - llp
            - sole_trader
            - partnership
            - trust
            - charity
            - foreign
          x-table-label: Type
          x-table-column: true
        incorporation_date:
          type: string
          format: date
        registered_address:
          type: string
        accounting_period_start:
          type: string
          format: date
          description: Start of the company's accounting reference period (CT600 / SA800 anchor)
        accounting_period_end:
          type: string
          format: date
        vat_registered:
          type: boolean
          default: false
          x-table-label: VAT
          x-table-column: true
        vat_scheme:
          type: string
          enum:
            - standard
            - flat_rate
            - cash_accounting
            - annual_accounting
            - none
          default: none
        is_personal_service_company:
          type: boolean
          default: false
          description: Marks PSCs (relevant for IR35 / off-payroll-working rules)
        dormant_flag:
          type: boolean
          default: false
        ceased_date:
          type: string
          format: date
        notes:
          type: string
  - slug: contribution
    name: Contribution
    description: A pension or charitable contribution affecting tax (Gift Aid, SIPP, etc.).
    icon: piggy-bank
    color: '#7C3AED'
    metadata_schema:
      type: object
      required:
        - scheme
        - mechanism
        - amount
        - date
      properties:
        scheme:
          type: string
          description: Provider/charity name
          x-table-label: Scheme
          x-table-column: true
        mechanism:
          type: string
          enum:
            - relief_at_source
            - net_pay
            - salary_sacrifice
            - gift_aid
          description: Pension relief mechanism, or gift_aid for charitable donations
          x-table-label: Mechanism
          x-table-column: true
        amount:
          type: string
          description: Net amount paid, decimal GBP
          x-table-label: Amount
          x-table-column: true
        date:
          type: string
          format: date
          x-table-label: Date
          x-table-column: true
        carry_back_to_prior_year:
          type: boolean
          default: false
          description: Gift Aid carry-back election
  - slug: document
    name: Document
    description: A source document — P60, P45, P11D, SA302, broker contract note, mortgage statement, bank statement — that other entities are parsed from.
    icon: file-text
    color: '#6B7280'
    metadata_schema:
      type: object
      required:
        - doc_type
        - source
      properties:
        doc_type:
          type: string
          enum:
            - P60
            - P45
            - P11D
            - SA302
            - bank_statement
            - savings_statement
            - broker_statement
            - contract_note
            - dividend_voucher
            - mortgage_statement
            - rental_agreement
            - receipt
            - other
          x-table-label: Type
          x-table-column: true
        source:
          type: string
          enum:
            - gmail
            - whatsapp_upload
            - manual
          x-table-label: Source
          x-table-column: true
        download_url:
          type: string
          format: uri
          description: Signed gateway artifact URL
        payer_or_employer:
          type: string
          description: Counterparty named on the document
        captured_at:
          type: string
          format: date-time
  - slug: expense
    name: Expense
    description: An allowable expense against a trade or property.
    icon: receipt
    color: '#DC2626'
    metadata_schema:
      type: object
      required:
        - category
        - amount
        - date
      properties:
        category:
          type: string
          enum:
            - cost_of_goods
            - travel
            - premises
            - repairs
            - admin
            - advertising
            - interest_finance
            - professional_fees
            - wages
            - utilities
            - insurance
            - agent_fees
            - other
          x-table-label: Category
          x-table-column: true
        amount:
          type: string
          description: Decimal GBP
          x-table-label: Amount
          x-table-column: true
        date:
          type: string
          format: date
          x-table-label: Date
          x-table-column: true
        notes:
          type: string
        is_capital:
          type: boolean
          default: false
          description: Capital vs revenue (capital expenses go to capital_allowances, not expenses)
  - slug: filing_obligation
    name: Filing Obligation
    description: A required tax return or filing the user (or one of their companies) must submit by a deadline. Captures SA100, CT600, SA800, SA900, VAT101, P11D, etc. Lets the agent surface deadlines proactively and reconcile against actual filings.
    icon: clock
    color: '#F97316'
    metadata_schema:
      type: object
      required:
        - return_form
        - period_start
        - period_end
        - deadline_type
        - due_date
      properties:
        return_form:
          type: string
          enum:
            - SA100
            - SA800
            - SA900
            - CT600
            - VAT101
            - P11D
            - PAYE_RTI
            - confirmation_statement
          x-table-label: Form
          x-table-column: true
        period_start:
          type: string
          format: date
        period_end:
          type: string
          format: date
        deadline_type:
          type: string
          enum:
            - paper_filing
            - online_filing
            - balancing_payment
            - poa1
            - poa2
            - corp_tax_payment
            - corp_tax_filing
            - vat_payment
            - registration
          x-table-label: Deadline
          x-table-column: true
        due_date:
          type: string
          format: date
          x-table-label: Due
          x-table-column: true
        status:
          type: string
          enum:
            - upcoming
            - reminded
            - overdue
            - filed
            - paid
            - waived
          default: upcoming
          x-table-label: Status
          x-table-column: true
        completed_date:
          type: string
          format: date
        hmrc_reference:
          type: string
          description: HMRC submission receipt or reference number, once filed.
  - slug: goal
    name: Goal
    description: A personal financial goal (emergency fund, deposit, retirement target, etc.).
    icon: target
    color: '#EC4899'
    metadata_schema:
      type: object
      required:
        - name
        - target_amount
        - category
      properties:
        name:
          type: string
          x-table-label: Goal
          x-table-column: true
        target_amount:
          type: string
          description: Decimal GBP
          x-table-label: Target
          x-table-column: true
        target_date:
          type: string
          format: date
          x-table-label: By
          x-table-column: true
        category:
          type: string
          enum:
            - emergency_fund
            - deposit
            - retirement
            - debt_payoff
            - other
          x-table-label: Category
          x-table-column: true
        current_amount:
          type: string
          description: Optional snapshot, decimal GBP
  - slug: holding
    name: Holding
    description: A current security position in a brokerage account.
    icon: trending-up
    color: '#8B5CF6'
    metadata_schema:
      type: object
      required:
        - ticker
        - quantity
        - as_of_date
      properties:
        ticker:
          type: string
          x-table-label: Ticker
          x-table-column: true
        isin:
          type: string
        quantity:
          type: string
          description: Decimal string
          x-table-label: Quantity
          x-table-column: true
        avg_cost:
          type: string
          description: Average cost per unit (s.104 pool), decimal string
        currency:
          type: string
          default: GBP
        as_of_date:
          type: string
          format: date
          x-table-label: As of
          x-table-column: true
  - slug: income_source
    name: Income Source
    description: A recurring origin of income (employer, trade, dividend payer, interest payer, rental property, pension, foreign source).
    icon: banknote
    color: '#22C55E'
    metadata_schema:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - employment
            - self_employment
            - dividend
            - interest
            - rental
            - pension
            - foreign
          x-table-label: Type
          x-table-column: true
        payer_name:
          type: string
          x-table-label: Payer
          x-table-column: true
        country:
          type: string
          description: ISO 3166-1 alpha-2; non-GB triggers SA106
        foreign_tax_paid:
          type: string
          description: Decimal — total foreign tax withheld at source for the tax year, in foreign_tax_currency. Drives Foreign Tax Credit Relief (FTCR) on SA106.
        foreign_tax_currency:
          type: string
          description: ISO 4217 of the foreign_tax_paid amount. Usually matches the income currency.
        withholding_jurisdiction:
          type: string
          description: ISO 3166-1 alpha-2 of the country that withheld the tax. May differ from `country` (e.g. US dividends paid via a UK broker — withheld in US, paid to UK).
        treaty_rate_applied:
          type: string
          description: Decimal — treaty withholding rate already applied at source (e.g. "0.15" for the 15% US/UK treaty rate on dividends). Used to flag over-withholding that may be recoverable from the source country.
        notes:
          type: string
  - slug: payment
    name: Payment
    description: A payment to or from HMRC — balancing payments, payments on account, corporation tax, VAT remittances, refunds. Distinct from generic transactions because it ties to filing_obligation and tax_assessment for reconciliation.
    icon: credit-card
    color: '#DB2777'
    metadata_schema:
      type: object
      required:
        - amount
        - currency
        - date
        - direction
        - kind
      properties:
        amount:
          type: string
          description: Decimal — always positive
          x-table-label: Amount
          x-table-column: true
        currency:
          type: string
          default: GBP
        date:
          type: string
          format: date
          x-table-label: Date
          x-table-column: true
        direction:
          type: string
          enum:
            - to_hmrc
            - from_hmrc
          x-table-label: Direction
          x-table-column: true
        kind:
          type: string
          enum:
            - balancing_payment
            - poa1
            - poa2
            - corp_tax
            - vat
            - paye_nic
            - refund
            - penalty
            - interest
          x-table-label: Kind
          x-table-column: true
        reference:
          type: string
          description: HMRC payment reference (UTR + K, or CT-specific accounting reference)
        method:
          type: string
          enum:
            - bank_transfer
            - direct_debit
            - debit_card
            - cheque
            - paye_coding
  - slug: property
    name: Property
    description: Real estate. Use for primary residences (PRR on disposal), let properties (SA105/SA106), holiday lets (FHL), and commercial real estate. Owner is set via owned_by or co_owned_by; never put owner in metadata.
    icon: home
    color: '#EA580C'
    metadata_schema:
      type: object
      required:
        - address
        - type
        - use
      properties:
        address:
          type: string
          x-table-label: Address
          x-table-column: true
        type:
          type: string
          enum:
            - residential
            - commercial
            - mixed_use
            - land
          x-table-label: Type
          x-table-column: true
        use:
          type: string
          description: How the property is used. Drives tax treatment more than physical type does.
          enum:
            - primary_residence
            - let
            - FHL
            - commercial_let
            - mixed_use
            - investment_held
          x-table-label: Use
          x-table-column: true
        country:
          type: string
          description: ISO 3166-1 alpha-2; non-GB triggers SA106
          default: GB
        rental_income_allowance_claimed:
          type: boolean
          default: false
          description: £1,000 property income allowance flag
        purchase_date:
          type: string
          format: date
        purchase_cost:
          type: string
          description: Decimal GBP — useful for PRR calculation on eventual disposal
  - slug: relief_claim
    name: Relief Claim
    description: A tax relief or allowance claim (Gift Aid, marriage allowance, EIS/SEIS, BADR, PRR).
    icon: shield-check
    color: '#059669'
    metadata_schema:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - gift_aid
            - marriage_allowance
            - EIS
            - SEIS
            - BADR
            - PRR
            - investors_relief
            - foreign_tax_credit
          x-table-label: Type
          x-table-column: true
        amount:
          type: string
          description: Decimal GBP if applicable
          x-table-label: Amount
          x-table-column: true
        notes:
          type: string
  - slug: tax_assessment
    name: Tax Assessment
    description: A computed or HMRC-issued tax position for one tax year, one subject. Captures SA302 outputs (HMRC's view) + agent-computed projections (our view) so we can reconcile and surface differences.
    icon: file-bar-chart
    color: '#7C3AED'
    metadata_schema:
      type: object
      required:
        - source
        - total_tax_due
        - computed_at
      properties:
        source:
          type: string
          enum:
            - agent_projection
            - hmrc_sa302
            - hmrc_ct600_acknowledgement
            - manual
          description: Where this assessment came from. agent_projection = our running estimate; hmrc_* = the authority's number.
          x-table-label: Source
          x-table-column: true
        total_income:
          type: string
          description: Decimal GBP — sum of all income sources before allowances
        total_tax_due:
          type: string
          description: Decimal GBP — final tax liability for the year
          x-table-label: Tax due
          x-table-column: true
        tax_paid_at_source:
          type: string
          description: PAYE + dividend tax withheld + foreign tax credit
        balancing_owed:
          type: string
          description: total_tax_due - tax_paid_at_source - poa_paid
        allowances_used:
          type: object
          description: Per-allowance breakdown (personal_allowance, dividend_allowance, psa, cgt_aea, etc.)
        computed_at:
          type: string
          format: date-time
        hmrc_reference:
          type: string
  - slug: tax_year
    name: Tax Year
    description: A UK fiscal year (6 April to 5 April) — the container all reportable activity is anchored to.
    icon: calendar
    color: '#0EA5E9'
    metadata_schema:
      type: object
      required:
        - year_label
        - start
        - end
      properties:
        year_label:
          type: string
          description: Year label, e.g. "2025-26"
          x-table-label: Year
          x-table-column: true
        start:
          type: string
          format: date
          description: Inclusive start, e.g. 2025-04-06
        end:
          type: string
          format: date
          description: Inclusive end, e.g. 2026-04-05
        filing_status:
          type: string
          enum:
            - in_progress
            - assembled
            - filed
          description: Where the user is in the cycle
          x-table-label: Status
          x-table-column: true
        filed_at:
          type: string
          format: date-time
        residence_status:
          type: string
          enum:
            - uk_resident
            - non_resident
            - split_year_arriver
            - split_year_leaver
            - dual_resident
          description: |
            UK tax residence for THIS year. Recorded per-tax_year because residence
            can change (someone moving in/out of the UK has different status year
            to year). Drives SA109 routing.
          x-table-label: Residence
          x-table-column: true
        arrival_date:
          type: string
          format: date
          description: For split-year arrivers — date residence began
        departure_date:
          type: string
          format: date
          description: For split-year leavers — date residence ended
  - slug: transaction
    name: Transaction
    description: A single debit or credit on an account.
    icon: arrow-left-right
    color: '#10B981'
    metadata_schema:
      type: object
      required:
        - date
        - amount
        - currency
      properties:
        date:
          type: string
          format: date
          x-table-label: Date
          x-table-column: true
        amount:
          type: string
          description: Decimal string. Positive = credit, negative = debit.
          x-table-label: Amount
          x-table-column: true
        currency:
          type: string
          default: GBP
        description:
          type: string
          x-table-label: Description
          x-table-column: true
        merchant_raw:
          type: string
          description: Verbatim merchant text from the statement; resolved/categorised later.
        tax_relevance:
          type: string
          enum:
            - none
            - income
            - expense
            - cgt
          description: Whether this transaction matters for the SA return.
          x-table-label: Tax
          x-table-column: true
        expense_category:
          type: string
          description: HMRC-aligned category for allowable expenses (cost_of_goods, travel, premises, repairs, admin, advertising, interest, professional_fees, wages, other).
        is_personal:
          type: boolean
          default: true
        native_amount:
          type: string
          description: Decimal amount in the foreign currency, when currency != GBP. Keep alongside `amount` so the agent can show both numbers and recompute if rates need correcting.
        native_currency:
          type: string
          description: ISO 4217 currency code of native_amount (e.g. "USD", "EUR"). When set, the `currency` field on this transaction is GBP and native_currency is the original.
        fx_rate_to_gbp:
          type: string
          description: Decimal — the FX rate snapshot used to convert native_amount to amount (GBP). Source the rate from the transaction date. Required when native_currency is set so HMRC-aligned conversion is auditable.
        fx_rate_source:
          type: string
          description: Where the FX rate came from (e.g. "hmrc_monthly", "broker_statement", "ecb_daily"). Helps reconcile if HMRC's published rate differs.
relationships:
  - slug: account_contains
    name: Account Contains
    description: An account contains a transaction or holding.
    metadata_schema:
      type: object
      properties: {}
  - slug: accountant_for
    name: Accountant For
    description: One subject acts as accountant or agent for another. Lets a hired accountant Lobu user be granted access to a client's $member or company entity later. Source can be either $member or company; target can be either.
    metadata_schema:
      type: object
      properties:
        engagement_start:
          type: string
          format: date
        engagement_end:
          type: string
          format: date
        scope:
          type: string
          enum:
            - self_assessment
            - corporation_tax
            - vat
            - payroll
            - full_service
  - slug: accumulates_in
    name: Accumulates In
    description: A transaction or contribution counts toward an allowance window. E.g. an ISA deposit accumulates_in the year's isa_subscription window; a pension contribution accumulates_in the year's pension_annual_allowance window.
    metadata_schema:
      type: object
      properties:
        amount_counted:
          type: string
          description: Decimal — usually equals the underlying transaction amount, but can differ (e.g. employer pension match counts toward AA but not toward your contribution)
  - slug: assessment_for
    name: Assessment For
    description: A tax_assessment is for a particular tax_year and subject. Used to anchor agent projections and HMRC SA302 outputs to the same year + filer so they can be compared.
    metadata_schema:
      type: object
      properties: {}
  - slug: co_owned_by
    name: Co-owned By
    description: An asset is jointly owned by multiple subjects. One row per co-owner. Sum of share_pct across all co-owners should equal 100.
    metadata_schema:
      type: object
      required:
        - share_pct
      properties:
        share_pct:
          type: number
          minimum: 0
          maximum: 100
        role:
          type: string
          enum:
            - primary_holder
            - joint_holder
            - beneficial_owner
          default: joint_holder
  - slug: controls
    name: Controls
    description: A person or company exercises significant control over a company (PSC register entry under the Companies Act). Source can be $member or company.
    metadata_schema:
      type: object
      properties:
        control_type:
          type: string
          enum:
            - shares_over_25_pct
            - voting_rights_over_25_pct
            - right_to_appoint_majority_directors
            - significant_influence_or_control
            - trust_or_firm_control
        declared_date:
          type: string
          format: date
  - slug: director_of
    name: Director Of
    description: A person is a registered director of a company.
    metadata_schema:
      type: object
      properties:
        appointment_date:
          type: string
          format: date
        resignation_date:
          type: string
          format: date
  - slug: disposal_of
    name: Disposal Of
    description: A CGT event disposes of (all or part of) an asset lot.
    metadata_schema:
      type: object
      properties:
        quantity_disposed:
          type: string
          description: Decimal — partial vs full disposal
  - slug: employed_by
    name: Employed By
    description: An employment-type income source flows from a particular employer (a company entity). Pairs with employee_of when the agent has the direct subject-to-subject employment fact.
    metadata_schema:
      type: object
      properties: {}
  - slug: employee_of
    name: Employee Of
    description: A person is employed by a company. Replaces the older `employed_by` indirection through `income_source` for direct subject-to-subject employment facts.
    metadata_schema:
      type: object
      properties:
        employment_start:
          type: string
          format: date
        employment_end:
          type: string
          format: date
          description: From P45 if the employment ended in this tax year
        paye_reference:
          type: string
          description: PAYE reference assigned by the employer (e.g. "123/AB456")
        role:
          type: string
  - slug: expense_of
    name: Expense Of
    description: An expense is incurred against a subject — a $member (personal allowable expense), a property (SA105/SA106), or a company (operating cost on the business books).
    metadata_schema:
      type: object
      properties: {}
  - slug: for_tax_year
    name: For Tax Year
    description: An entity (transaction, cgt_event, contribution, relief_claim, expense) is recorded against a particular tax year.
    metadata_schema:
      type: object
      properties: {}
  - slug: income_from
    name: Income From
    description: A transaction is income from a particular source (employer, dividend payer, interest payer, rental, etc.).
    metadata_schema:
      type: object
      properties:
        gross_amount:
          type: string
          description: Gross decimal GBP if different from the net transaction amount
        tax_deducted:
          type: string
          description: PAYE / withholding deducted at source, decimal GBP
  - slug: obligation_for
    name: Obligation For
    description: A filing_obligation belongs to a tax_year and a subject ($member or company). The same SA100 obligation is "for" the user's $member and "for" their tax_year.
    metadata_schema:
      type: object
      properties: {}
  - slug: owned_by
    name: Owned By
    description: An asset (account, holding, asset_lot, property) is owned by a subject ($member or company). Use co_owned_by instead when ownership is shared.
    metadata_schema:
      type: object
      properties: {}
  - slug: parsed_from
    name: Parsed From
    description: An entity (transaction, cgt_event, holding, etc.) was parsed from a source document — provenance link.
    metadata_schema:
      type: object
      properties:
        extraction_confidence:
          type: number
          minimum: 0
          maximum: 1
        line_number:
          type: integer
          description: Optional anchor into the source document
  - slug: partner_in
    name: Partner In
    description: A person is a partner in an LLP or partnership. Drives SA104 routing for partnership income.
    metadata_schema:
      type: object
      properties:
        partnership_share_pct:
          type: number
          minimum: 0
          maximum: 100
        profit_share_pct:
          type: number
          minimum: 0
          maximum: 100
          description: May differ from capital share if the partnership agreement says so
        joined_date:
          type: string
          format: date
        left_date:
          type: string
          format: date
  - slug: settles
    name: Settles
    description: A payment settles part or all of a filing_obligation (e.g. balancing_payment settles SA100 balancing). One filing_obligation may be settled by multiple payments.
    metadata_schema:
      type: object
      properties:
        portion_settled:
          type: string
          description: Decimal — how much of the obligation this payment covers (defaults to the full payment amount when not specified)
  - slug: shareholder_of
    name: Shareholder Of
    description: A person or company holds shares in a company. Source can be either $member or company (companies can own other companies).
    metadata_schema:
      type: object
      properties:
        share_class:
          type: string
          description: e.g. "ordinary", "A ordinary", "preference"
        shareholding_pct:
          type: number
          minimum: 0
          maximum: 100
        shares_held:
          type: integer
          description: Number of shares (alternative to percentage when share count is known)
        acquired_date:
          type: string
          format: date
  - slug: spouse_of
    name: Spouse Of
    description: Marriage or civil partnership. Symmetric. Relevant for marriage allowance, jointly held assets, and inheritance planning.
    metadata_schema:
      type: object
      properties:
        relationship_kind:
          type: string
          enum:
            - marriage
            - civil_partnership
        partnership_date:
          type: string
          format: date
        dissolution_date:
          type: string
          format: date
  - slug: transfer_pair
    name: Transfer Pair
    description: Two transactions are the two legs of an internal transfer between accounts the same subject controls (e.g. Jane's current → Jane's savings). Salary or distributions crossing subject boundaries (Ltd current → Jane personal) are NOT internal transfers and must not be linked here. Symmetric. When this link exists, neither side counts as taxable income or as an allowable expense.
    metadata_schema:
      type: object
      properties:
        direction:
          type: string
          enum:
            - outbound
            - inbound
          description: Which leg this row represents — outbound (debit on source) or inbound (credit on destination)
watchers:
  - slug: gmail-tx
    agent: personal-finance
    name: Gmail financial-event extractor
    schedule: '*/30 * * * *'
    prompt: |
      You are a private financial accountant scanning the user's forwarded Gmail messages for events that matter to a UK Self Assessment return.

      ## Recent emails
      {{#if sources.gmail_messages}}
      {{sources.gmail_messages}}
      {{else}}
      No new messages this window.
      {{/if}}

      ## Active tax year
      {{#if entities}}
      {{#each entities}}
      - {{name}} ({{entity_type}}, ID: {{id}})
      {{/each}}
      {{else}}
      No tax year context provided.
      {{/if}}

      ---

      Identify and extract financial events. Each email may yield zero, one, or many events. Be conservative: skip noise (marketing, password resets, etc.).

      Categories to extract:
      - **transactions** — deposits, debits, transfers, salary credits, dividend payments hitting an account
      - **cgt_events** — broker contract notes for sells/disposals, gifts, transfers out of a GIA
      - **dividends** — UK or foreign dividend notifications (gross + currency)
      - **documents** — P60/P45/P11D/SA302/contract notes/mortgage statements arriving as attachments or linked PDFs

      For each item, include the source `gmail_message_id` so we can link provenance. Prefer GBP unless the message clearly states a different currency.

      Skip transactions inside ISAs and SIPPs unless they are dividends or contributions (which are still reportable). Mark `tax_relevance="none"` for ISA-internal transactions; mark `tax_relevance="cgt"` for non-wrapper disposals.
    extraction_schema:
      type: object
      required:
        - transactions
        - cgt_events
        - dividends
        - documents
      properties:
        transactions:
          type: array
          items:
            type: object
            required:
              - date
              - amount
              - currency
              - description
              - gmail_message_id
            properties:
              date:
                type: string
                format: date
              amount:
                type: string
                description: Decimal string. Positive = credit, negative = debit.
              currency:
                type: string
              description:
                type: string
              merchant_raw:
                type: string
              account_hint:
                type: string
                description: Free-text hint about which account ("Monzo current", "HL ISA", etc.). Resolved later.
              tax_relevance:
                type: string
                enum:
                  - none
                  - income
                  - expense
                  - cgt
              gmail_message_id:
                type: string
        cgt_events:
          type: array
          items:
            type: object
            required:
              - asset_description
              - asset_class
              - disposal_date
              - disposal_proceeds
              - gmail_message_id
            properties:
              asset_description:
                type: string
              asset_class:
                type: string
                enum:
                  - listed_shares
                  - unlisted_shares
                  - residential_property
                  - other_property
                  - crypto
                  - other
              acquisition_date:
                type: string
                format: date
              acquisition_cost:
                type: string
              disposal_date:
                type: string
                format: date
              disposal_proceeds:
                type: string
              incidental_costs:
                type: string
              gmail_message_id:
                type: string
        dividends:
          type: array
          items:
            type: object
            required:
              - payer
              - gross
              - currency
              - date
              - gmail_message_id
            properties:
              payer:
                type: string
              gross:
                type: string
              currency:
                type: string
              date:
                type: string
                format: date
              country:
                type: string
                description: ISO 3166-1 alpha-2 if foreign
              gmail_message_id:
                type: string
        documents:
          type: array
          items:
            type: object
            required:
              - doc_type
              - gmail_message_id
            properties:
              doc_type:
                type: string
                enum:
                  - P60
                  - P45
                  - P11D
                  - SA302
                  - bank_statement
                  - savings_statement
                  - broker_statement
                  - contract_note
                  - dividend_voucher
                  - mortgage_statement
                  - rental_agreement
                  - receipt
                  - other
              payer_or_employer:
                type: string
              tax_year_hint:
                type: string
                description: Tax year label if visible on the document, e.g. "2025-26"
              gmail_message_id:
                type: string
    sources:
      - name: gmail_messages
        query: |
          SELECT id, title, payload_text, payload_html, occurred_at FROM events WHERE connector_key = 'google.gmail' ORDER BY occurred_at DESC LIMIT 200
    reactions_guidance: |
      After extracting:
      1. Resolve or create the active `tax_year` entity from the user's profile. Each new transaction / cgt_event / contribution must be linked to it via `for_tax_year`.
      2. For each `documents[]` entry, create a `document` entity (source="gmail") and use it as the `parsed_from` target for the transactions / cgt_events / dividends extracted from that same gmail_message_id.
      3. For each `transactions[]` entry, resolve or create the `account` from `account_hint` and link via `account_contains`. If income, create or resolve an `income_source` and link via `income_from`.
      4. For `cgt_events[]`, look up matching `asset_lot` rows in the same `pool_id` and link via `disposal_of`. If acquisition data is missing, save a note flagging the gap rather than guessing.
      5. For `dividends[]`, create a `transaction(tax_relevance=income)` linked to an `income_source(type=dividend, payer_name, country)`.
      6. Never overwrite a user-edited entity. If a duplicate is suspected (same date + amount + account), surface it as a question instead of writing.
