version: 1
type: entity
slug: company
name: Company
description: A legal entity that can hold accounts, file tax returns, employ people, or be owned. Covers Ltd, PLC, LLP, sole-trader, partnership, trust, and charity. Discriminate by company_type.
icon: building
color: "#0EA5E9"
metadata_schema:
  type: object
  required:
    - legal_name
    - company_type
  # Identity numbers (hmrc_utr, hmrc_paye_reference, companies_house_number,
  # vat_number, hmrc_ni_number) live in entity_identities, not metadata.
  # `not` blocks accidental writes to those fields here.
  not:
    anyOf:
      - required: [hmrc_utr]
      - required: [hmrc_paye_reference]
      - required: [companies_house_number]
      - required: [vat_number]
      - required: [hmrc_ni_number]
  properties:
    legal_name:
      type: string
      x-table-label: Name
      x-table-column: true
    company_type:
      type: string
      enum:
        - ltd
        - plc
        - llp
        - sole_trader
        - partnership
        - trust
        - charity
        - foreign
      x-table-label: Type
      x-table-column: true
    incorporation_date:
      type: string
      format: date
    registered_address:
      type: string
    accounting_period_start:
      type: string
      format: date
      description: Start of the company's accounting reference period (CT600 / SA800 anchor)
    accounting_period_end:
      type: string
      format: date
    vat_registered:
      type: boolean
      default: false
      x-table-label: VAT
      x-table-column: true
    vat_scheme:
      type: string
      enum: [standard, flat_rate, cash_accounting, annual_accounting, none]
      default: none
    is_personal_service_company:
      type: boolean
      default: false
      description: Marks PSCs (relevant for IR35 / off-payroll-working rules)
    dormant_flag:
      type: boolean
      default: false
    ceased_date:
      type: string
      format: date
    notes:
      type: string
