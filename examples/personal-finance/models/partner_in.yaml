version: 1
type: relationship
slug: partner_in
name: Partner In
description: A person is a partner in an LLP or partnership. Drives SA104 routing for partnership income.
metadata_schema:
  type: object
  properties:
    partnership_share_pct:
      type: number
      minimum: 0
      maximum: 100
    profit_share_pct:
      type: number
      minimum: 0
      maximum: 100
      description: May differ from capital share if the partnership agreement says so
    joined_date:
      type: string
      format: date
    left_date:
      type: string
      format: date
