version: 1
type: entity
slug: cgt_event
name: CGT Event
description: A capital-gains disposal — sale, gift, or other event triggering CGT (SA108).
icon: scissors
color: "#F59E0B"
metadata_schema:
  type: object
  required:
    - asset_description
    - asset_class
    - disposal_date
    - disposal_proceeds
  properties:
    asset_description:
      type: string
      x-table-label: Asset
      x-table-column: true
    asset_class:
      type: string
      enum:
        - listed_shares
        - unlisted_shares
        - residential_property
        - other_property
        - crypto
        - other
      x-table-label: Class
      x-table-column: true
    acquisition_date:
      type: string
      format: date
    acquisition_cost:
      type: string
      description: Total acquisition cost, decimal string GBP
    disposal_date:
      type: string
      format: date
      x-table-label: Disposal
      x-table-column: true
    disposal_proceeds:
      type: string
      description: Total proceeds, decimal string GBP
      x-table-label: Proceeds
      x-table-column: true
    incidental_costs:
      type: string
      description: Legal, broker, SDLT on acquisition, enhancement
    relief_claimed:
      type: string
      enum:
        - none
        - PRR
        - BADR
        - investors_relief
        - gift_holdover
        - EIS_deferral
        - SEIS_deferral
      default: none
      x-table-label: Relief
      x-table-column: true
    residential_60day_return_ref:
      type: string
      description: HMRC reference if a 60-day residential CGT return was already filed
