version: 1
type: relationship
slug: co_owned_by
name: Co-owned By
description: An asset is jointly owned by multiple subjects. One row per co-owner. Sum of share_pct across all co-owners should equal 100.
metadata_schema:
  type: object
  required:
    - share_pct
  properties:
    share_pct:
      type: number
      minimum: 0
      maximum: 100
    role:
      type: string
      enum: [primary_holder, joint_holder, beneficial_owner]
      default: joint_holder
