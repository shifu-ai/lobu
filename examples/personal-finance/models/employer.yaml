version: 1
type: entity
slug: employer
name: Employer
description: An employer for SA102 employment-page reporting.
icon: briefcase
color: "#0891B2"
metadata_schema:
  type: object
  required:
    - name
  properties:
    name:
      type: string
      x-table-label: Employer
      x-table-column: true
    paye_reference:
      type: string
      description: PAYE reference, e.g. "123/AB456"
      x-table-label: PAYE Ref
      x-table-column: true
    director_flag:
      type: boolean
      default: false
    employment_start:
      type: string
      format: date
    cessation_date:
      type: string
      format: date
      description: From P45 if the employment ended in this tax year
