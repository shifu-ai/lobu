version: 1
type: relationship
slug: accountant_for
name: Accountant For
description: One subject acts as accountant or agent for another. Lets a hired accountant Lobu user be granted access to a client's $member or company entity later. Source can be either $member or company; target can be either.
metadata_schema:
  type: object
  properties:
    engagement_start:
      type: string
      format: date
    engagement_end:
      type: string
      format: date
    scope:
      type: string
      enum: [self_assessment, corporation_tax, vat, payroll, full_service]
