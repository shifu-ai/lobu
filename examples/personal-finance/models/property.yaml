version: 1
type: entity
slug: property
name: Property
description: Real estate. Use for primary residences (PRR on disposal), let properties (SA105/SA106), holiday lets (FHL), and commercial real estate. Owner is set via owned_by or co_owned_by; never put owner in metadata.
icon: home
color: "#EA580C"
metadata_schema:
  type: object
  required:
    - address
    - type
    - use
  properties:
    address:
      type: string
      x-table-label: Address
      x-table-column: true
    type:
      type: string
      enum:
        - residential
        - commercial
        - mixed_use
        - land
      x-table-label: Type
      x-table-column: true
    use:
      type: string
      description: How the property is used. Drives tax treatment more than physical type does.
      enum:
        - primary_residence
        - let
        - FHL
        - commercial_let
        - mixed_use
        - investment_held
      x-table-label: Use
      x-table-column: true
    country:
      type: string
      description: ISO 3166-1 alpha-2; non-GB triggers SA106
      default: GB
    rental_income_allowance_claimed:
      type: boolean
      default: false
      description: £1,000 property income allowance flag
    purchase_date:
      type: string
      format: date
    purchase_cost:
      type: string
      description: Decimal GBP — useful for PRR calculation on eventual disposal
