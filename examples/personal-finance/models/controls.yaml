version: 1
type: relationship
slug: controls
name: Controls
description: A person or company exercises significant control over a company (PSC register entry under the Companies Act). Source can be $member or company.
metadata_schema:
  type: object
  properties:
    control_type:
      type: string
      enum:
        - shares_over_25_pct
        - voting_rights_over_25_pct
        - right_to_appoint_majority_directors
        - significant_influence_or_control
        - trust_or_firm_control
    declared_date:
      type: string
      format: date
