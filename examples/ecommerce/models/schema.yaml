version: 2
entities:
  - slug: customer
    name: Customer
    description: A customer with subscriptions, orders, and communication preferences
    icon: user
    color: '#3B82F6'
    metadata_schema:
      type: object
      properties:
        full_name:
          type: string
          x-table-label: Name
          x-table-column: true
        status:
          type: string
          x-table-label: Status
          x-table-column: true
        plan:
          type: string
          x-table-label: Plan
          x-table-column: true
        communication_preference:
          type: string
          x-table-label: Preference
          x-table-column: true
  - slug: order
    name: Order
    description: A customer order with fulfillment status and delivery details
    icon: shopping-cart
    color: '#8B5CF6'
    metadata_schema:
      type: object
      properties:
        order_number:
          type: string
          x-table-label: Order
          x-table-column: true
        product:
          type: string
          x-table-label: Product
          x-table-column: true
        fulfillment_status:
          type: string
          x-table-label: Status
          x-table-column: true
        customer:
          type: string
          x-table-label: Customer
          x-table-column: true
  - slug: product
    name: Product
    description: A product in the catalog linked to subscriptions and orders
    icon: package
    color: '#F59E0B'
    metadata_schema:
      type: object
      properties:
        product_name:
          type: string
          x-table-label: Product
          x-table-column: true
        plan_tier:
          type: string
          x-table-label: Tier
          x-table-column: true
        delivery_frequency:
          type: string
          x-table-label: Delivery
          x-table-column: true
        price:
          type: string
          x-table-label: Price
          x-table-column: true
  - slug: subscription
    name: Subscription
    description: A recurring subscription plan with billing cycle and pending changes
    icon: repeat
    color: '#10B981'
    metadata_schema:
      type: object
      properties:
        plan_name:
          type: string
          x-table-label: Plan
          x-table-column: true
        frequency:
          type: string
          x-table-label: Frequency
          x-table-column: true
        status:
          type: string
          x-table-label: Status
          x-table-column: true
        pending_changes:
          type: string
          x-table-label: Pending
          x-table-column: true
relationships:
  - slug: has-preference
    name: Has Preference
    description: Persist communication and delivery preferences across interactions.
  - slug: placed-order
    name: Placed Order
    description: Link orders to customers so purchase history stays queryable.
  - slug: subscribed-to
    name: Subscribed To
    description: Track which plans and products each customer subscribes to.
watchers:
  - slug: customer-activity-tracker
    agent: ecommerce-ops
    name: Customer activity tracker
    schedule: 0 */6 * * *
    prompt: |
      Monitor customers for new orders, subscription changes, delivery requests, and support interactions.
    extraction_schema:
      type: object
      required:
        - subscription_status
        - pending_changes
        - recent_orders
        - communication_preferences
        - open_requests
      properties:
        subscription_status:
          type: string
        pending_changes:
          type: array
          items:
            type: string
        recent_orders:
          type: array
          items:
            type: string
        communication_preferences:
          type: string
        open_requests:
          type: array
          items:
            type: string
