<style>
  @font-face { font-family:"Manrope"; font-weight:200 800; font-display:block; src:url("./assets/fonts/Manrope.woff2") format("woff2"); }
  @font-face { font-family:"JetBrains Mono"; font-weight:100 800; font-display:block; src:url("./assets/fonts/JetBrainsMono.woff2") format("woff2"); }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:1200px; height:630px; overflow:hidden; background:oklch(0.1700 0.0040 50); }

  #stage { position:absolute; inset:0; }

  /* depth glow behind the ring (right side) */
  .glow { position:absolute; right:40px; top:50%; width:720px; height:720px; transform:translateY(-50%);

  .glow2 { position:absolute; inset:0; background:radial-gradient(120% 90% at 76% 52%, rgba(224,121,56,0.05), transparent 55%); }

  /* ── LEFT: title column ── */
  .brand { position:absolute; top:62px; left:80px; display:inline-flex; align-items:center; gap:11px; }
  .brand .word { font-weight:800; font-size:26px; letter-spacing:-0.02em; }
  .brand .os { font-size:11.5px; font-weight:700; letter-spacing:0.16em; text-transform:uppercase;
    color:oklch(0.7006 0.1891 46.5400); border:1px solid rgba(224,121,56,0.55); border-radius:999px; padding:4px 10px; }

  h1 { position:absolute; top:196px; left:80px; width:500px; text-align:left;
    font-size:58px; font-weight:800; letter-spacing:-0.025em; line-height:1.04; }
  h1 .hl { color:oklch(0.7006 0.1891 46.5400); }
  .sub { position:absolute; top:432px; left:80px; width:470px; text-align:left;
    font-size:21px; font-weight:600; line-height:1.4; color:oklch(0.7200 0.0080 50); }

  /* ── RIGHT: orbit ring ── */
  #ring { position:absolute; inset:0; pointer-events:none; }
  #ringPath { fill:none; stroke:rgba(224,121,56,0.42); stroke-width:2; stroke-dasharray:7 9; }
  #orbit { position:absolute; left:885px; top:332px; width:0; height:0; }
  #pellet { position:absolute; left:-7px; top:-157px; width:14px; height:14px; border-radius:999px;
    background:oklch(0.7006 0.1891 46.5400); box-shadow:0 0 11px 2px rgba(224,121,56,0.95); }

  .node { position:absolute; width:104px; height:104px; transform:translate(-50%,-50%); }
  .disc { width:104px; height:104px; border-radius:999px; position:relative;
    border:1px solid oklch(0.3400 0.0080 50); background:linear-gradient(180deg, oklch(0.2250 0.0050 50), oklch(0.1700 0.0040 50));
    display:flex; align-items:center; justify-content:center; box-shadow:0 14px 34px -18px rgba(0,0,0,0.6); }
  .disc svg { width:40px; height:40px; margin-top:13px; }
  .nodeglow { position:absolute; inset:-10px; border-radius:999px; opacity:0; pointer-events:none;
    background:radial-gradient(closest-side, rgba(224,121,56,0.5), transparent 72%); }
  .num { position:absolute; top:18px; left:50%; transform:translateX(-50%); z-index:2;
    font-family:"JetBrains Mono", ui-monospace, monospace; font-size:13px; font-weight:700; line-height:1;
    color:oklch(0.7006 0.1891 46.5400); }
  .lab { position:absolute; left:50%; transform:translateX(-50%); text-align:center; white-space:nowrap; }
  .lab .e { font-size:13px; font-weight:700; letter-spacing:0.15em; color:oklch(0.7006 0.1891 46.5400); }
  .lab .d { font-size:17px; font-weight:700; letter-spacing:-0.01em; margin-top:3px; }
  .lab.top { bottom:116px; }   /* above the top node */
  .lab.bot { top:116px; }      /* below the lower nodes */
</style></head>

<script>
  window.__timelines = window.__timelines || {};
  const tl = gsap.timeline({ paused: true });
  // pellet orbits the ring by rotating its container 360° about the ring centre
  // (transform-origin 0 0 == #orbit's own position = ring centre). Constant
  // speed, closed rotation → frame0 == frameLast (seamless loop). Robust vs the
  // SVG MotionPath arc-parsing pitfall.
  tl.to("#orbit", { duration: 5, ease: "none", rotation: 360, transformOrigin: "0 0" }, 0);
  // node underglow pulses as the pellet passes each beat (evenly spaced on the ring)
  function pulse(sel, at) {
    tl.to(sel, { opacity: 0.9, duration: 0.5, yoyo: true, repeat: 1, ease: "sine.inOut" }, at - 0.5);
  }
  pulse("#g1", 0.01);     // WATCH at top (t=0)
  pulse("#g2", 1.667);    // UNDERSTAND
  pulse("#g3", 3.333);    // ACT
  // gentle ring dash drift (cyclic over the loop)
  tl.fromTo("#ringPath", { strokeDashoffset: 0 }, { strokeDashoffset: -64, duration: 5, ease: "none" }, 0);
  window.__timelines["main"] = tl;
</script>
