<!DOCTYPE html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lobu</title>
    <script>
      // Detect system preference and set theme immediately to avoid flash
      (function() {
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.classList.toggle('dark', prefersDark);
        document.documentElement.classList.toggle('light', !prefersDark);

        // Listen for system preference changes
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
          document.documentElement.classList.toggle('dark', e.matches);
          document.documentElement.classList.toggle('light', !e.matches);
        });
      })();
    </script>
    <style>
      /* SSR public-page overlay: stays visible until the SPA's first paint, then fades out. */
      #ssr-hydrate-shell[data-public-ssr] {
        position: fixed;
        inset: 0;
        overflow: auto;
        z-index: 1;
        background: #fff;
        transition: opacity 180ms ease-out;
      }
      html.dark #ssr-hydrate-shell[data-public-ssr] {
        background: #0a0a0a;
      }
      #ssr-hydrate-shell[data-public-ssr].is-hidden {
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
