apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lobu.fullname" . }}-app
  labels:
    {{- include "lobu.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.app.replicaCount }}
  {{- with .Values.app.strategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- else }}
  {{- if .Values.app.workspaces.enabled }}
  # The workspaces PVC is RWO so we can't have two pods mount it at once;
  # default to Recreate to avoid scheduling conflicts. Single-replica
  # operators see a brief (~30s) "no available server" window on every
  # deploy as a result. To eliminate it, set RWX storage on workspaces
  # (or move workspaces off this deployment entirely) and override
  # `app.strategy` to RollingUpdate via values. See PR #773 discussion.
  strategy:
    type: Recreate
  {{- end }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "lobu.appSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "lobu.appSelectorLabels" . | nindent 8 }}
      {{- with .Values.app.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.app.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      # Grace period must exceed preStopDelaySeconds + reasonable shutdown
      # time for the gateway (graceful_shutdown in server.ts cleans up
      # task scheduler, embedded gateway, DB pool, HTTP server). Default
      # k8s grace period is 30s; bump so the preStop sleep doesn't eat
      # the whole window.
      terminationGracePeriodSeconds: {{ .Values.app.terminationGracePeriodSeconds | default 45 }}
      containers:
        - name: app
          image: {{ include "lobu.appImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.app.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: 8787
              protocol: TCP
          env:
            {{- range $key, $value := .Values.app.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- if and .Values.ingress.hosts (not (hasKey .Values.app.env "PUBLIC_WEB_URL")) }}
            - name: PUBLIC_WEB_URL
              value: {{ printf "https://%s" (first .Values.ingress.hosts) | quote }}
            {{- end }}
            {{- if .Values.embeddings.service.port }}
            {{- if .Values.embeddings.serviceUrl }}
            - name: EMBEDDINGS_SERVICE_URL
              value: {{ .Values.embeddings.serviceUrl | quote }}
            {{- else if .Values.embeddings.enabled }}
            - name: EMBEDDINGS_SERVICE_URL
              value: {{ printf "http://%s-embeddings:%d" (include "lobu.fullname" .) (.Values.embeddings.service.port | int) | quote }}
            {{- end }}
            {{- end }}
            {{- if .Values.database.existingSecret }}
            {{- if .Values.database.usePooler }}
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret }}
                  key: username
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret }}
                  key: password
            - name: DATABASE_URL
              value: "postgresql://$(DB_USER):$(DB_PASS)@{{ .Values.database.poolerService }}:5432/{{ .Values.database.name }}?sslmode=disable"
            {{- else }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret }}
                  key: {{ .Values.database.existingSecretKey }}
            {{- end }}
            {{- end }}
          {{- $secretName := include "lobu.secretName" . }}
          {{- if $secretName }}
          envFrom:
            - secretRef:
                name: {{ $secretName }}
          {{- end }}
          {{- /*
          PreStop hook is only useful under RollingUpdate (the new pod is
          already serving, so deregistering the old pod via Service
          endpoint removal + giving downstream caches time to notice it
          shrinks the "old pod kept getting traffic during drain" window).
          Under `Recreate` (the workspaces-RWO default), the new pod
          doesn't start until the old one fully terminates — adding a
          preStop sleep would EXTEND the no-available-server window by
          its duration. We only emit the hook when preStopDelaySeconds
          is explicitly > 0; ops repos using RollingUpdate set it,
          Recreate-mode deploys leave it at the default 0.
          */ -}}
          {{- if gt (int (.Values.app.preStopDelaySeconds | default 0)) 0 }}
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep {{ .Values.app.preStopDelaySeconds }}"]
          {{- end }}
          # Readiness probes the DB too (/health/ready does SELECT 1).
          # Failing readiness pulls the pod out of the Service endpoint set
          # without restarting it — right semantic for a transient DB blip.
          # Liveness stays on /health (process-up only) so a pooler hiccup
          # doesn't trigger CrashLoopBackOff.
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: {{ .Values.healthCheck.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthCheck.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.healthCheck.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.healthCheck.readinessProbe.failureThreshold }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: {{ .Values.healthCheck.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthCheck.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.healthCheck.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.healthCheck.livenessProbe.failureThreshold }}
          {{- if .Values.app.workspaces.enabled }}
          volumeMounts:
            - name: workspaces
              mountPath: /app/workspaces
          {{- end }}
          resources:
            {{- toYaml .Values.app.resources | nindent 12 }}
      {{- if .Values.app.workspaces.enabled }}
      volumes:
        - name: workspaces
          persistentVolumeClaim:
            claimName: {{ include "lobu.fullname" . }}-app-workspaces
      {{- end }}
