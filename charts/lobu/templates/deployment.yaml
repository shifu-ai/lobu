apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lobu.fullname" . }}-app
  labels:
    {{- include "lobu.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.app.replicaCount }}
  {{- with .Values.app.strategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- else }}
  {{- if .Values.app.workspaces.enabled }}
  strategy:
    type: Recreate
  {{- end }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "lobu.appSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "lobu.appSelectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.app.terminationGracePeriodSeconds }}
      terminationGracePeriodSeconds: {{ . }}
      {{- end }}
      containers:
        - name: app
          image: {{ include "lobu.appImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.app.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if and .Values.app.lifecycle .Values.app.lifecycle.preStopSleepSeconds (gt (int .Values.app.lifecycle.preStopSleepSeconds) 0) }}
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep {{ .Values.app.lifecycle.preStopSleepSeconds }}"]
          {{- end }}
          ports:
            - containerPort: 8787
              protocol: TCP
          env:
            {{- range $key, $value := .Values.app.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- if .Values.ingress.hosts }}
            - name: BASE_URL
              value: {{ printf "https://%s" (first .Values.ingress.hosts) | quote }}
            {{- end }}
            {{- $workerSmoke := .Values.releaseGates.smokeTest.workerSmoke | default dict }}
            {{- if and $workerSmoke (hasKey $workerSmoke "enabled") $workerSmoke.enabled }}
            # Pin SMOKE_TEST_ALLOWED_HOST to the in-cluster app Service
            # DNS name so /api/internal/smoke/dispatch refuses any
            # request whose Host header is the operator's public
            # ingress hostname. Belt-and-braces with the
            # x-forwarded-* refusal in the route handler.
            - name: SMOKE_TEST_ALLOWED_HOST
              value: {{ printf "%s-app" (include "lobu.fullname" .) | quote }}
            {{- end }}
            {{- if .Values.embeddings.service.port }}
            {{- if .Values.embeddings.serviceUrl }}
            - name: EMBEDDINGS_SERVICE_URL
              value: {{ .Values.embeddings.serviceUrl | quote }}
            {{- else if .Values.embeddings.enabled }}
            - name: EMBEDDINGS_SERVICE_URL
              value: {{ printf "http://%s-embeddings:%d" (include "lobu.fullname" .) (.Values.embeddings.service.port | int) | quote }}
            {{- end }}
            {{- end }}
            {{- if .Values.database.existingSecret }}
            {{- if .Values.database.usePooler }}
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret }}
                  key: username
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret }}
                  key: password
            - name: DATABASE_URL
              value: "postgresql://$(DB_USER):$(DB_PASS)@{{ .Values.database.poolerService }}:5432/{{ .Values.database.name }}?sslmode=disable"
            {{- else }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret }}
                  key: {{ .Values.database.existingSecretKey }}
            {{- end }}
            {{- end }}
          {{- if .Values.secretName }}
          envFrom:
            - secretRef:
                name: {{ .Values.secretName }}
          {{- end }}
          # Readiness probes the DB too (/health/ready does SELECT 1).
          # Failing readiness pulls the pod out of the Service endpoint set
          # without restarting it — right semantic for a transient DB blip.
          # Liveness stays on /health (process-up only) so a pooler hiccup
          # doesn't trigger CrashLoopBackOff.
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8787
            initialDelaySeconds: {{ .Values.healthCheck.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthCheck.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.healthCheck.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.healthCheck.readinessProbe.failureThreshold }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8787
            initialDelaySeconds: {{ .Values.healthCheck.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthCheck.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.healthCheck.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.healthCheck.livenessProbe.failureThreshold }}
          {{- if .Values.app.workspaces.enabled }}
          volumeMounts:
            - name: workspaces
              mountPath: /app/workspaces
          {{- end }}
          resources:
            {{- toYaml .Values.app.resources | nindent 12 }}
      {{- if .Values.app.workspaces.enabled }}
      volumes:
        - name: workspaces
          persistentVolumeClaim:
            claimName: {{ include "lobu.fullname" . }}-app-workspaces
      {{- end }}
