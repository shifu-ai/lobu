apiVersion: v1
kind: Service
metadata:
  name: {{ include "lobu.fullname" . }}-app
  labels:
    {{- include "lobu.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "lobu.appSelectorLabels" . | nindent 4 }}
