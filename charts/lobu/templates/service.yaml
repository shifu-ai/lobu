apiVersion: v1
kind: Service
metadata:
  name: {{ include "lobu.fullname" . }}-app
  labels:
    {{- include "lobu.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  {{- with .Values.service.sessionAffinity }}
  {{- if ne . "None" }}
  sessionAffinity: {{ . }}
  {{- if eq . "ClientIP" }}
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: {{ $.Values.service.sessionAffinityTimeoutSeconds | default 10800 }}
  {{- end }}
  {{- end }}
  {{- end }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8787
      protocol: TCP
      name: http
  selector:
    {{- include "lobu.appSelectorLabels" . | nindent 4 }}
