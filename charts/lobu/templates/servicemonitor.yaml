{{- if .Values.metrics.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "lobu.fullname" . }}-app
  {{- with .Values.metrics.serviceMonitor.namespace }}
  namespace: {{ . }}
  {{- end }}
  labels:
    {{- include "lobu.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
    {{- /* The kube-prometheus-stack Prometheus selects ServiceMonitors by this
           label (serviceMonitorSelector: release=kube-prometheus-stack). Without
           it the monitor is silently ignored. */}}
    {{- with .Values.metrics.serviceMonitor.additionalLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  selector:
    matchLabels:
      {{- include "lobu.appSelectorLabels" . | nindent 6 }}
  endpoints:
      # The Prometheus exporter lives on the gateway, which the unified server
      # mounts under /lobu — so metrics are at /lobu/metrics, not /metrics
      # (root /metrics 302-redirects to the SPA → scrape fails on Content-Type).
    - port: http
      path: {{ .Values.metrics.serviceMonitor.path }}
      interval: {{ .Values.metrics.serviceMonitor.interval }}
      scrapeTimeout: {{ .Values.metrics.serviceMonitor.scrapeTimeout }}
{{- end }}
