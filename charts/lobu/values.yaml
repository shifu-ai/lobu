# Default values for lobu chart

# Global settings
nameOverride: ""
fullnameOverride: ""

# Image settings (shared between app, worker, and embeddings)
image:
  registry: ghcr.io
  repository: lobu-ai/lobu
  pullPolicy: Always
  # Tag defaults to chart appVersion
  tag: "latest"

imagePullSecrets:
  - name: ghcr-credentials

# App deployment settings (API backend)
app:
  replicaCount: 1
  # With workspaces.enabled=false (Phase 5 default), the chart leaves
  # strategy unset so the Deployment uses kube-default RollingUpdate.
  # Setting `workspaces.enabled: true` (legacy RWO path) still pins to
  # Recreate below.
  strategy: {}

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  # Non-secret environment variables
  env:
    NODE_ENV: production
    # Tags all Sentry events (server + forwarded to the worker subprocess) so a
    # prod deploy can never report under environment=development. Worker spawn
    # forwards this via assembleBaseEnv (base-deployment-manager.ts).
    ENVIRONMENT: production
    # Hold teardown after SIGTERM so /health/ready returns 503 and kube-proxy
    # removes this pod from the Service endpoints before in-flight connections
    # are cut. Keep below terminationGracePeriodSeconds (and roughly aligned
    # with lifecycle.preStopSleepSeconds).
    SHUTDOWN_READINESS_DRAIN_MS: "5000"
    # Bounded wait for in-flight HTTP responses (incl. SSE/MCP streams) to drain
    # before process exit. Keep below the remaining grace-period budget.
    HTTP_CLOSE_TIMEOUT_MS: "10000"

  # Graceful-shutdown budget. Must comfortably exceed the sum of the readiness
  # drain + in-flight HTTP close + gateway/worker teardown, or the kubelet
  # SIGKILLs mid-drain (orphaning workers — the failure `make clean-workers`
  # exists to mop up).
  terminationGracePeriodSeconds: 60

  # preStop sleep keeps the container alive briefly after the pod is marked
  # Terminating, covering the window where kube-proxy endpoint removal lags the
  # SIGTERM. Belt-and-braces with SHUTDOWN_READINESS_DRAIN_MS. Set to 0 to skip.
  lifecycle:
    preStopSleepSeconds: 5

  # Container-level hardening. runAsNonRoot is left unset because the app image
  # currently has no non-root USER (docker/app/Dockerfile) — enable it once the
  # image ships a non-root user. The defaults below are safe to apply even as
  # root and drop a meaningful amount of attack surface.
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault

  # PodDisruptionBudget. Rendered only when replicaCount > 1 so single-replica
  # installs aren't blocked from ever draining a node. minAvailable keeps at
  # least one app pod serving across voluntary disruptions (node drains/upgrades).
  pdb:
    enabled: true
    minAvailable: 1

  # Persistent workspaces volume. The embedded worker stores the
  # durable transcript in Postgres (`agent_transcript_snapshot`); the
  # rest of {WORKSPACE_DIR} (input/output/temp) is pod-local ephemeral
  # — a per-conversation advisory lock pins runs to one pod for the
  # run lifetime. Disable by default so the deployment can roll across
  # replicas; flip to `true` only if you have a specific reason to
  # persist scratch files across restarts.
  workspaces:
    enabled: false
    size: 20Gi
    storageClass: ""

# Worker deployment settings
worker:
  enabled: true
  replicaCount: 1
  # RWO cache PVCs cannot be mounted by old and new pods at once.
  # Defaults to Recreate when cache.enabled; override for RWX/no-cache deployments.
  strategy: {}

  # Cache PVCs are mounted as root-owned by default; grant the image user group write access.
  podSecurityContext:
    fsGroup: 1001
    fsGroupChangePolicy: OnRootMismatch

  # Agent/connector runs can be minutes-long; give the daemon time to finish
  # or hand off in-flight runs after SIGTERM before the kubelet escalates to
  # SIGKILL (which orphans runs until the stale-run reaper recovers them).
  terminationGracePeriodSeconds: 300

  # The worker executes untrusted agent/connector code — the highest-value
  # container to harden. runAsUser must stay numeric and match the image's
  # UID (docker/worker/Dockerfile: useradd -u 1001): the kubelet cannot
  # verify runAsNonRoot from a named image USER and rejects the container
  # with CreateContainerConfigError, wedging the rollout until Helm's
  # --wait timeout.
  containerSecurityContext:
    runAsNonRoot: true
    runAsUser: 1001
    runAsGroup: 1001
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault

  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: 2000m
      memory: 4Gi

  env:
    POLL_INTERVAL_MS: "10000"
    # Tag Sentry events from the worker/embeddings deployment as production.
    ENVIRONMENT: production

  # Transformer model cache volume
  cache:
    enabled: true
    size: 5Gi
    storageClass: ""

# Embeddings service deployment settings
embeddings:
  enabled: true
  replicaCount: 1
  # RWO cache PVCs cannot be mounted by old and new pods at once.
  # Defaults to Recreate when cache.enabled; override for RWX/no-cache deployments.
  strategy: {}

  # Cache PVCs are mounted as root-owned by default; grant the image user group write access.
  podSecurityContext:
    fsGroup: 1001
    fsGroupChangePolicy: OnRootMismatch

  # runAsUser must stay numeric and match the image's UID
  # (docker/embeddings-service/Dockerfile: useradd -u 1001) so the kubelet
  # can verify runAsNonRoot without inferring from image metadata.
  containerSecurityContext:
    runAsNonRoot: true
    runAsUser: 1001
    runAsGroup: 1001
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault

  serviceUrl: ""

  resources:
    requests:
      # Bumped from 500m: the local embedding model runs CPU-bound and inline, so
      # 500m starved it — batches blocked the event loop long enough to trip the
      # liveness probe (prod backfill -> SIGKILL -> failed embeddings + restart loop).
      cpu: 1000m
      memory: 1Gi
    limits:
      memory: 3Gi

  # The embeddings service runs the model INLINE on a single-threaded event loop, so
  # a heavy batch blocks /health. The app's shared probe (3s timeout x3) killed a
  # busy-but-healthy service mid-request in prod. Liveness must detect a DEAD process,
  # not a BUSY one, so the embeddings service gets its own tolerant probe.
  healthCheck:
    readinessProbe:
      initialDelaySeconds: 10
      periodSeconds: 15
      timeoutSeconds: 10
      failureThreshold: 6
    livenessProbe:
      initialDelaySeconds: 45
      periodSeconds: 30
      timeoutSeconds: 15
      failureThreshold: 8

  env: {}

  service:
    port: 8790

  cache:
    enabled: true
    size: 5Gi
    storageClass: ""

# Service settings
service:
  type: ClusterIP
  port: 8787
  # Pin each client to the same pod for the lifetime of the affinity
  # window. Required when running >1 app replica: SSE streams
  # (`/api/v1/agents/<id>/events`) and the per-pod backlog in
  # `SseManager` are not cross-pod — a client whose first SSE chunk
  # lands on pod A and whose later run claim lands on pod B would
  # silently miss events. ClientIP affinity works at kube-proxy
  # without any ingress controller config. Disabled by default; the
  # helmrelease in deploy/k8s opts in alongside `replicaCount: 2`.
  #
  # `sessionAffinity` accepts "None" (default) or "ClientIP". The
  # timeout is the affinity window in seconds (default 10800 = 3h);
  # set lower if NAT churn is a concern.
  sessionAffinity: None
  sessionAffinityTimeoutSeconds: 10800

# Ingress settings
ingress:
  enabled: true
  className: traefik
  annotations: {}
  hosts: []  # List of hosts (e.g., [summaries.now, app.lobu.ai])
  tls: []

# Secret reference (must exist in namespace)
# Contains: JWT_SECRET, GITHUB_TOKEN, etc.
secretName: ""

# Database settings (for connecting to CNPG cluster)
database:
  # If set, overrides DATABASE_URL from secret
  host: ""
  port: 5432
  name: "app"  # Database name (required when usePooler=true)
  # Secret containing database credentials (from CNPG)
  existingSecret: ""
  existingSecretKey: "uri"
  # Use PgBouncer pooler instead of direct connection
  usePooler: false
  poolerService: ""  # e.g., "db-pooler-rw"

# Health check settings
healthCheck:
  readinessProbe:
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  livenessProbe:
    initialDelaySeconds: 30
    periodSeconds: 20
    timeoutSeconds: 3
    failureThreshold: 3

migrations:
  enabled: false
  database:
    existingSecret: ""
    existingSecretKey: "uri"
    name: "app"
    usePooler: false
    poolerService: ""

releaseGates:
  databasePreflight:
    # When migrations are enabled, verify the target database is reachable
    # before invoking dbmate. This fails fast on wrong DB names instead of
    # letting dbmate attempt to create a missing production database.
    enabled: true
    timeoutSeconds: 10
  smokeTest:
    # Helm post-install/post-upgrade hook. The release is not considered
    # healthy until the in-cluster app Service responds successfully.
    enabled: true
    path: /api/health
    timeoutSeconds: 300
    intervalSeconds: 2

    # Phase 3 — drive an actual worker run end-to-end.
    #
    # When enabled, the Job POSTs to /api/internal/smoke/dispatch, which
    # inserts a synthetic chat_message run. The runs-queue MessageConsumer
    # claims it, spawns a worker subprocess, and on completion writes a
    # row into `agent_transcript_snapshot`. The Job polls for that row
    # and fails the deploy if `terminal_status='completed'` doesn't
    # materialise within `timeoutSeconds`.
    #
    # Default OFF. Operators MUST add three keys to the deployment Secret
    # before enabling, AND preprovision a matching agent row:
    #
    #   SMOKE_TEST_TOKEN=<random ≥32 chars>
    #   SMOKE_TEST_AGENT_ID=<your-smoke-agent-id>
    #   SMOKE_TEST_ORG_ID=<your-smoke-org-id>
    #
    # The gateway PINS the smoke agentId + organizationId from the env
    # at dispatch time — caller-supplied values in the dispatch body are
    # ignored. This makes a leaked SMOKE_TEST_TOKEN structurally unable
    # to dispatch a synthetic run against a real tenant. Mirrored from
    # lobu#878.
    workerSmoke:
      enabled: false
      conversationIdPrefix: "smoke-"
      timeoutSeconds: 90
      intervalSeconds: 3

# Prometheus metrics scraping + alerting. Requires the prometheus-operator CRDs
# (kube-prometheus-stack). Both default OFF so the chart installs without the
# operator; the prod overlay (owletto-deploy) turns them on. The Prometheus in
# this cluster selects by `release: kube-prometheus-stack`, so set that under
# additionalLabels when enabling.
metrics:
  serviceMonitor:
    enabled: false
    # namespace: ""        # defaults to the release namespace
    # Metrics are exposed by the gateway, mounted under /lobu by the unified
    # server — so the scrape path is /lobu/metrics (root /metrics redirects).
    path: /lobu/metrics
    interval: 30s
    scrapeTimeout: 10s
    additionalLabels: {}   # e.g. { release: kube-prometheus-stack }
  prometheusRule:
    enabled: false
    # namespace: ""
    additionalLabels: {}   # e.g. { release: kube-prometheus-stack }
