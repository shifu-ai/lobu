# Default values for the public Lobu chart.
# See values.example.yaml for a minimal copy/paste install template.

nameOverride: ""
fullnameOverride: ""

image:
  registry: ghcr.io
  # The chart appends -app, -worker, and -embeddings for the three images.
  repository: lobu-ai/lobu
  pullPolicy: IfNotPresent
  # The image pipeline publishes timestamp tags plus latest. Pin a timestamp
  # tag for production upgrades; latest keeps first-time installs simple.
  tag: "latest"

# Public images do not require pull secrets. Set this if your cluster must
# authenticate to GHCR or you mirror images into a private registry.
imagePullSecrets: []

# Existing Kubernetes Secret loaded into app, worker, embeddings, and migration
# pods via envFrom. It commonly contains DATABASE_URL, JWT_SECRET,
# BETTER_AUTH_SECRET, provider API keys, and integration OAuth credentials.
secretName: ""

# Optional chart-managed Secret. Prefer an external secret manager for
# production; this is here for small test clusters and quick demos.
secrets:
  create: false
  name: ""
  stringData: {}

app:
  replicaCount: 1
  strategy: {}
  podAnnotations: {}
  podSecurityContext: {}
  securityContext: {}
  # Seconds the preStop hook sleeps before SIGTERM is sent. Gives Service
  # endpoint deregistration + downstream LB cache time to notice the pod
  # is going away, so in-flight requests during the deregistration lag
  # still hit a live process.
  #
  # Default 0 (preStop hook NOT emitted). Set to ~15 only when running
  # with `app.strategy.type: RollingUpdate` and replicaCount > 1.
  # Under the default Recreate strategy (workspaces PVC is RWO), the
  # new pod doesn't start until the old one terminates, so adding a
  # preStop sleep would EXTEND the no-available-server window — the
  # opposite of what we want.
  preStopDelaySeconds: 0
  # Total time k8s waits for the pod to stop before SIGKILL. Must be
  # > preStopDelaySeconds + actual shutdown time. The gateway's graceful
  # shutdown closes the HTTP server, stops the task scheduler, drains the
  # DB pool — empirically ~5s.
  terminationGracePeriodSeconds: 45

  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi

  env:
    NODE_ENV: production

  # Opt-in to multi-replica / rolling deploys. DEFAULT FALSE — leaving
  # this off keeps the safe `strategy: Recreate` behavior. Setting it
  # true makes the chart pick `RollingUpdate` (maxSurge: 1,
  # maxUnavailable: 0) when workspaces is RWX or disabled.
  #
  # Prerequisites BEFORE setting true — chart cannot detect these:
  #   1. Workspaces volume must be RWX-capable:
  #      `app.workspaces.accessModes: [ReadWriteMany]` + a storage class
  #      that backs it (NFS, EFS, CephFS, Longhorn-RWX, …).
  #   2. NO active Chat connections in `mode: "polling"` (Telegram).
  #      Multiple replicas long-polling the same bot conflict. Use
  #      webhook mode only — see
  #      gateway/connections/chat-instance-manager.ts:610.
  #   3. Acknowledge that the gateway has in-memory state for SSE
  #      streams (gateway/services/sse-manager.ts) and AskUser
  #      questions (gateway/connections/interaction-bridge.ts:193).
  #      A request whose SSE stream / AskUser click lands on a
  #      different replica than the one holding the state will be
  #      silently dropped. Migrating these to Postgres LISTEN/NOTIFY +
  #      durable storage is tracked as separate hardening work — until
  #      then, occasional dropped streams / button clicks are the cost
  #      of zero-downtime deploys on this configuration.
  #
  # Single-replica + RollingUpdate (replicaCount: 1, allowMultiReplica: true)
  # still creates a brief overlap window where both pods are running.
  # The same in-memory caveats apply during that window, just for a
  # shorter span (~5-15s).
  allowMultiReplica: false

  # Persistent workspaces volume. Embedded agent workers store session and
  # workspace state below /app/workspaces (watcher run scratch, agent panel
  # sessions, etc.).
  workspaces:
    enabled: true
    size: 20Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce

worker:
  # Connector ingestion worker. Disable if you only need the API/chat gateway.
  enabled: true
  replicaCount: 1
  strategy: {}
  podAnnotations: {}
  podSecurityContext:
    fsGroup: 1001
    fsGroupChangePolicy: OnRootMismatch
  securityContext: {}

  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: 2000m
      memory: 4Gi

  env:
    POLL_INTERVAL_MS: "10000"

  cache:
    enabled: true
    size: 5Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce

embeddings:
  enabled: true
  replicaCount: 1
  strategy: {}
  podAnnotations: {}
  podSecurityContext:
    fsGroup: 1001
    fsGroupChangePolicy: OnRootMismatch
  securityContext: {}

  # If set, app and worker use this URL instead of the in-chart service.
  serviceUrl: ""

  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      memory: 3Gi

  env: {}

  service:
    port: 8790

  cache:
    enabled: true
    size: 5Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce

service:
  type: ClusterIP
  port: 8787
  # Pin each client to the same pod for the lifetime of the affinity
  # window. Required when running >1 app replica: SSE streams
  # (`/api/v1/agents/<id>/events`) and the per-pod backlog in
  # `SseManager` are not cross-pod — a client whose first SSE chunk
  # lands on pod A and whose later run claim lands on pod B would
  # silently miss events. ClientIP affinity works at kube-proxy
  # without any ingress controller config. Disabled by default; the
  # helmrelease in deploy/k8s opts in alongside `replicaCount: 2`.
  #
  # `sessionAffinity` accepts "None" (default) or "ClientIP". The
  # timeout is the affinity window in seconds (default 10800 = 3h);
  # set lower if NAT churn is a concern.
  sessionAffinity: None
  sessionAffinityTimeoutSeconds: 10800

# Optional Ingress for public webhooks and the admin UI. When hosts are set,
# the app Deployment derives PUBLIC_WEB_URL from the first host unless you set
# app.env.PUBLIC_WEB_URL explicitly.
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

# Database configuration. For most installs, create a Secret with DATABASE_URL
# and set database.existingSecret below. Alternatively, keep database empty and
# provide DATABASE_URL through secretName/secrets. When migrations.enabled and
# secrets.create are both true, put DATABASE_URL in secrets.stringData or set
# migrations.database.existingSecret so the hook does not depend on a Secret
# that Helm has not created yet.
database:
  existingSecret: ""
  existingSecretKey: uri
  name: app
  usePooler: false
  poolerService: ""

healthCheck:
  readinessProbe:
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 6
  livenessProbe:
    initialDelaySeconds: 30
    periodSeconds: 20
    timeoutSeconds: 3
    failureThreshold: 3

migrations:
  # When enabled, Helm runs migrations as a pre-install/pre-upgrade Job and you
  # should set app.env.SKIP_MIGRATIONS: "1" so app pods do not repeat them. If
  # secrets.create is true and DATABASE_URL lives in that chart-managed Secret,
  # the Job reads secrets.stringData.DATABASE_URL directly because normal chart
  # resources are not created before pre-install hooks run.
  enabled: false
  database:
    existingSecret: ""
    existingSecretKey: uri
    name: app
    usePooler: false
    poolerService: ""

releaseGates:
  databasePreflight:
    enabled: true
    timeoutSeconds: 10
  smokeTest:
    enabled: true
    path: /api/health
    timeoutSeconds: 300
    intervalSeconds: 2
    # Post-migration schema verification. Each entry is `<table>.<column>`;
    # the smoke job fails the rollout if any listed column is missing from
    # `information_schema.columns`. Catches the case where a migration was
    # edited after it was first applied to prod — the new ALTER never re-runs
    # (its version is already in `schema_migrations`), but `dbmate up` on a
    # fresh DB applies the edited file cleanly, so PR CI stays green.
    # Add a column here whenever a new migration introduces one that app
    # routes assume exists.
    requiredSchema:
      - device_workers.id
      - device_workers.organization_id
      - connections.device_worker_id
      - connections.organization_id
