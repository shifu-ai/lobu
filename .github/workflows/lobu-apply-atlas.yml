name: Sync Atlas agent

# Dogfoods the "agent definitions live in git, sync via GitHub Actions"
# pattern documented at docs/guides/sync-from-github.md.
#
# - PRs that touch examples/atlas/** run `lobu apply --dry-run` so reviewers
#   see the planned diff inline.
# - Pushes to main run `lobu apply --yes` to converge the cloud org.
#
# Skipped when LOBU_TOKEN is not configured (e.g. fork PRs); the job
# logs a notice and exits 0 so it doesn't gate other checks.

on:
  push:
    branches: [main]
    paths:
      - "examples/atlas/**"
      - ".github/workflows/lobu-apply-atlas.yml"
  pull_request:
    paths:
      - "examples/atlas/**"
      - ".github/workflows/lobu-apply-atlas.yml"

permissions:
  contents: read

concurrency:
  group: lobu-apply-atlas-${{ github.ref }}
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Skip if secrets not configured
        id: gate
        env:
          TOKEN: ${{ secrets.LOBU_TOKEN }}
          ZAI: ${{ secrets.Z_AI_API_KEY }}
        run: |
          if [ -z "${TOKEN:-}" ]; then
            echo "LOBU_TOKEN not set — skipping (expected for fork PRs)."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          elif [ -z "${ZAI:-}" ]; then
            echo "Z_AI_API_KEY not set — skipping until repo secret is configured."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: oven-sh/setup-bun@v2
        if: steps.gate.outputs.skip != 'true'
        with:
          bun-version: 1.3.5

      # `node packages/cli/bin/lobu.js` is the runtime entrypoint; Node 22 is the
      # repo's supported major (see AGENTS.md prereqs).
      - uses: actions/setup-node@v6
        if: steps.gate.outputs.skip != 'true'
        with:
          node-version: "22"

      - name: Install dependencies
        if: steps.gate.outputs.skip != 'true'
        run: bun install

      # Build and run the WORKSPACE CLI from this commit, not `bunx @lobu/cli`
      # (the published npm version). The atlas project is authored in
      # lobu.config.ts (the TS authoring SDK); the published CLI lags the repo
      # and predates the TS-config loader, so it would fail with
      # "No lobu.toml found". `make build-packages` skips the owletto web build
      # when the submodule is absent — a cloud apply doesn't need it.
      - name: Build packages
        if: steps.gate.outputs.skip != 'true'
        run: make build-packages

      - name: Apply
        if: steps.gate.outputs.skip != 'true'
        working-directory: examples/atlas
        env:
          # CLI reads LOBU_API_TOKEN (not LOBU_TOKEN) as the env-var override
          # for stored credentials — see packages/cli/src/internal/credentials.ts.
          LOBU_API_TOKEN: ${{ secrets.LOBU_TOKEN }}
          Z_AI_API_KEY: ${{ secrets.Z_AI_API_KEY }}
        run: |
          LOBU="node $GITHUB_WORKSPACE/packages/cli/bin/lobu.js"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            $LOBU apply --org atlas --dry-run
          else
            $LOBU apply --org atlas --yes
          fi
