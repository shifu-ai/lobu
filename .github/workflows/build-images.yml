name: Build and Push Images

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      platforms:
        description: "Target platforms for the docker builds. Defaults to amd64 only — bump to linux/amd64,linux/arm64 when you need the multi-arch image (rare)."
        type: string
        default: linux/amd64
        required: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  # Image names are pinned so the GitOps repo's ImageUpdateAutomation keeps
  # tracking ghcr.io/lobu-ai/lobu-{app,worker,embeddings} after the
  # lobu -> lobu monorepo consolidation.
  IMAGE_NAME_APP: ${{ github.repository_owner }}/lobu-app
  IMAGE_NAME_WORKER: ${{ github.repository_owner }}/lobu-worker
  IMAGE_NAME_EMBEDDINGS: ${{ github.repository_owner }}/lobu-embeddings
  # Prod runs Hetzner cpx41 (x86_64 only — see project_hetzner_prod_cost
  # memory), so main-branch pushes build amd64 only. This dropped the
  # build-app step from ~25min to ~8min AND fixed the disk-full failure
  # mode (~14GB GHA runner couldn't hold both arch Playwright/Chrome
  # downloads + image layers + buildx cache). The workflow_dispatch
  # `platforms` input lets you rebuild multi-arch on demand if a dev
  # machine needs the arm64 image, without slowing every prod deploy.
  BUILD_PLATFORMS: ${{ inputs.platforms || 'linux/amd64' }}

jobs:
  generate-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.timestamp.outputs.tag }}
      build_time: ${{ steps.timestamp.outputs.build_time }}
    steps:
      - name: Generate shared timestamp tag
        id: timestamp
        run: |
          echo "tag=$(date -u +'%Y%m%d-%H%M%S')" >> "$GITHUB_OUTPUT"
          echo "build_time=$(date -u +'%Y-%m-%dT%H:%M:%S.000Z')" >> "$GITHUB_OUTPUT"

  # Connector-runtime parity smoke gate (main/deploy side). RUNS the built worker
  # artifact's self-check before any image is pushed, so the packaging/parity
  # drift that broke prod (worker image missing `COPY packages/core` → dangling
  # transitive `@lobu/core` → every feed sync crashed, all CI green) can't ship.
  # `build-worker` depends on this, and `build-app` depends on `build-worker`, so
  # a failing smoke blocks BOTH worker and app pushes — critical because the chart
  # applies one shared tag to app + worker and Flux's ImageUpdateAutomation would
  # otherwise roll the app to a tag whose worker is broken.
  #
  # amd64-only (no QEMU/arm64): a smoke gate, not a release. Reuses the same GHA
  # buildx cache scope as `build-worker` so this doesn't double the build cost.
  connector-parity-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Builds + runs the image locally (push: false), so it never needs the
    # top-level `packages: write`. Drop to read-only for least privilege.
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Build worker image (amd64, load, no push)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          platforms: linux/amd64
          file: ./docker/worker/Dockerfile
          load: true
          push: false
          tags: lobu-worker:parity-smoke
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker

      - name: Worker image self-check (docker run --network=none)
        run: |
          docker run --rm --network=none lobu-worker:parity-smoke \
            bun src/bin.ts self-check --json

  build-app:
    runs-on: ubuntu-latest
    environment: production
    # Push the app image LAST. Flux's ImageUpdateAutomation only watches
    # the app image policy, but the chart applies one shared tag to app,
    # worker, AND embeddings. If app pushed before worker or embeddings,
    # Flux would roll the release to a tag whose sibling images don't yet
    # exist (or never will, if a sibling build failed for an unrelated
    # reason — disk pressure, registry hiccup, an unrelated Dockerfile
    # regression). Earlier in this PR I tried parallelizing build-app for
    # a ~7min critical-path win, but pi flagged the real (low-probability
    # but not zero) failure window: a failed sibling build still lets
    # build-app push the watched tag, and Flux rolls a half-existent
    # tag. Reverted to the safe gate. The arm64-drop alone still cuts
    # ~15-20min off the critical path, which is the bigger lever anyway.
    needs: [generate-tag, build-worker, build-embeddings-service]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - id: submodule
        uses: ./.github/actions/setup-submodule
        with:
          deploy-key: ${{ secrets.OWLETTO_WEB_DEPLOY_KEY }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Log in to Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_APP }}
          tags: |
            type=raw,value=${{ needs.generate-tag.outputs.tag }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push App image
        id: push-app
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          platforms: ${{ env.BUILD_PLATFORMS }}
          file: ./docker/app/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            ${{ steps.meta.outputs.labels }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ needs.generate-tag.outputs.build_time }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            io.shifu.release.workflow=.github/workflows/build-images.yml
          build-args: |
            CACHEBUST=${{ github.sha }}
            APP_GIT_SHA=${{ github.sha }}
            APP_BUILD_TIME=${{ needs.generate-tag.outputs.build_time }}
            SKIP_WEB_BUILD=${{ steps.submodule.outputs.stubbed == 'true' }}
            VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}
            VITE_ENVIRONMENT=production
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Write bounded app image receipt
        env:
          IMAGE_DIGEST: ${{ steps.push-app.outputs.digest }}
          IMAGE_TAG: ${{ needs.generate-tag.outputs.tag }}
          BUILD_TIME: ${{ needs.generate-tag.outputs.build_time }}
        run: |
          jq -n \
            --arg schemaVersion "1" \
            --arg sourceRepository "${{ github.repository }}" \
            --arg gitRevision "${{ github.sha }}" \
            --arg buildTime "$BUILD_TIME" \
            --arg image "${{ env.REGISTRY }}/${{ env.IMAGE_NAME_APP }}:$IMAGE_TAG" \
            --arg imageDigest "$IMAGE_DIGEST" \
            '{schemaVersion:($schemaVersion|tonumber),sourceRepository:$sourceRepository,gitRevision:$gitRevision,buildTime:$buildTime,image:$image,imageDigest:$imageDigest}' \
            > lobu-app-image-receipt.json

      - name: Upload bounded app image receipt
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: lobu-app-image-receipt
          path: lobu-app-image-receipt.json
          if-no-files-found: error
          retention-days: 90

      - name: Make image public
        run: |
          curl -L -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/user/packages/container/lobu-app/visibility \
            -d '{"visibility":"public"}' || true

      - name: Verify immutable app image is pullable
        run: docker manifest inspect ghcr.io/shifu-ai/lobu-app@${{ steps.push-app.outputs.digest }} > /dev/null

      - name: Produce bounded unsigned Lobu build receipt
        env:
          IMAGE_DIGEST: ${{ steps.push-app.outputs.digest }}
          IMAGE_REFERENCE: ghcr.io/shifu-ai/lobu-app@${{ steps.push-app.outputs.digest }}
          BUILD_TIME: ${{ needs.generate-tag.outputs.build_time }}
          RECEIPT_KEY_ID: pending-protected-signer
        run: |
          node scripts/publish-agent-release-build-receipt.mjs > lobu-app-unsigned-build-receipt.json
          test "$(wc -c < lobu-app-unsigned-build-receipt.json)" -le 32768

      - name: Upload bounded unsigned Lobu build receipt
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: lobu-app-unsigned-build-receipt
          path: lobu-app-unsigned-build-receipt.json
          if-no-files-found: error
          retention-days: 1

  sign-lobu-build-receipt:
    needs: [build-app]
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: none
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: lobu-app-unsigned-build-receipt
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: lobu-app-image-receipt
      - name: Strictly validate and sign bounded receipt without repository code
        env:
          RECEIPT_PRIVATE_KEY_PKCS8: ${{ secrets.AGENT_RELEASE_LOBU_BUILD_RECEIPT_PRIVATE_KEY_PKCS8 }}
          RECEIPT_KEY_ID: ${{ secrets.AGENT_RELEASE_LOBU_BUILD_RECEIPT_KEY_ID }}
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const { createHash, createPrivateKey, sign } = require('node:crypto');
          void (async () => {
          const path = 'lobu-app-unsigned-build-receipt.json';
          if (fs.statSync(path).size > 32768) throw new Error('unsigned receipt too large');
          if (fs.statSync('lobu-app-image-receipt.json').size > 32768) throw new Error('image receipt too large');
          const receipt = JSON.parse(fs.readFileSync(path, 'utf8'));
          const image = JSON.parse(fs.readFileSync('lobu-app-image-receipt.json', 'utf8'));
          const keys = x => Object.keys(x).sort().join(',');
          const expected = 'artifactDigest,artifactIdentity,buildIdentityDigest,buildTime,dependencyId,expiresAt,observedAt,origin,provenance,provides,receiptKind,requires,scope,signing,sourceRevision';
          if (!receipt || Array.isArray(receipt) || keys(receipt) !== expected) throw new Error('closed receipt schema required');
          if (!image || Array.isArray(image) || keys(image) !== 'buildTime,gitRevision,image,imageDigest,schemaVersion,sourceRepository' || image.schemaVersion !== 1) throw new Error('closed image receipt schema required');
          if (keys(receipt.provenance) !== 'breakGlass,conclusion,environmentProtected,provider,ref,repository,runAttempt,runId,workflow') throw new Error('closed provenance schema required');
          if (keys(receipt.signing) !== 'algorithm,keyId,purpose') throw new Error('closed signing schema required');
          if (receipt.receiptKind !== 'build_artifact' || receipt.scope !== 'global' || receipt.dependencyId !== 'lobu-runtime') throw new Error('invalid receipt identity');
          if (!/^sha256:[0-9a-f]{64}$/.test(receipt.artifactDigest) || receipt.artifactIdentity !== `ghcr.io/shifu-ai/lobu-app@${receipt.artifactDigest}`) throw new Error('invalid OCI digest binding');
          if (!/^[0-9a-f]{40}$/.test(receipt.sourceRevision) || receipt.origin !== 'ghcr.io/shifu-ai/lobu-app') throw new Error('invalid source identity');
          if (receipt.sourceRevision !== process.env.GITHUB_SHA || process.env.GITHUB_REPOSITORY !== 'shifu-ai/lobu' || process.env.GITHUB_REF !== 'refs/heads/main') throw new Error('signer source context mismatch');
          if (receipt.provenance.repository !== 'shifu-ai/lobu' || receipt.provenance.workflow !== '.github/workflows/build-images.yml' || receipt.provenance.ref !== 'refs/heads/main' || receipt.provenance.conclusion !== 'success' || receipt.provenance.environmentProtected !== true || receipt.provenance.breakGlass !== false) throw new Error('invalid provenance');
          if (receipt.provenance.runId !== process.env.GITHUB_RUN_ID || receipt.provenance.runAttempt !== process.env.GITHUB_RUN_ATTEMPT) throw new Error('signer run context mismatch');
          if (receipt.signing.algorithm !== 'Ed25519' || receipt.signing.purpose !== 'lobu_build_artifact_receipt') throw new Error('invalid signing policy');
          if (receipt.signing.keyId !== 'pending-protected-signer' || !process.env.RECEIPT_KEY_ID || !/^[A-Za-z0-9._:-]{1,128}$/.test(process.env.RECEIPT_KEY_ID)) throw new Error('invalid protected signing key id');
          if (image.sourceRepository !== process.env.GITHUB_REPOSITORY || image.gitRevision !== receipt.sourceRevision || image.buildTime !== receipt.buildTime || image.imageDigest !== receipt.artifactDigest || image.image !== `ghcr.io/shifu-ai/lobu-app:${image.image.split(':').at(-1)}`) throw new Error('independent build output mismatch');
          const labels = await registryLabels(receipt.artifactDigest);
          if (labels['org.opencontainers.image.revision'] !== process.env.GITHUB_SHA ||
            labels['org.opencontainers.image.created'] !== receipt.buildTime ||
            labels['org.opencontainers.image.source'] !== 'https://github.com/shifu-ai/lobu' ||
            labels['io.shifu.release.workflow'] !== '.github/workflows/build-images.yml') {
            throw new Error('registry label mismatch');
          }
          if (!Array.isArray(receipt.provides) || receipt.provides.join(',') !== 'agent-release.readiness.v1' || !Array.isArray(receipt.requires) || receipt.requires.length) throw new Error('invalid capability contract');
          if (Date.parse(receipt.expiresAt) - Date.parse(receipt.observedAt) !== 172800000) throw new Error('invalid receipt lifetime');
          const canonical = value => JSON.stringify(value, (_k, item) => item && typeof item === 'object' && !Array.isArray(item) ? Object.fromEntries(Object.entries(item).sort(([a],[b]) => a.localeCompare(b))) : item);
          const expectedBuildIdentity = `sha256:${createHash('sha256').update(canonical({sourceRevision:receipt.sourceRevision,buildTime:receipt.buildTime,imageDigest:receipt.artifactDigest,capabilities:receipt.provides})).digest('hex')}`;
          if (receipt.buildIdentityDigest !== expectedBuildIdentity) throw new Error('invalid build identity digest');
          receipt.signing.keyId = process.env.RECEIPT_KEY_ID;
          const key = createPrivateKey({ key: Buffer.from(process.env.RECEIPT_PRIVATE_KEY_PKCS8, 'base64'), format: 'der', type: 'pkcs8' });
          receipt.signing.signature = sign(null, Buffer.from(canonical(receipt)), key).toString('base64');
          const output = canonical(receipt) + '\n';
          if (Buffer.byteLength(output) > 32768) throw new Error('signed receipt too large');
          fs.writeFileSync('lobu-app-signed-build-receipt.json', output, { flag: 'wx' });
          })().catch((error) => { console.error(error instanceof Error ? error.message : String(error)); process.exit(1); });

          async function registryLabels(expectedDigest) {
            const manifest = await fetchRegistryJson(`manifests/${expectedDigest}`, 131072,
              'application/vnd.oci.image.index.v1+json, application/vnd.docker.distribution.manifest.list.v2+json, application/vnd.oci.image.manifest.v1+json, application/vnd.docker.distribution.manifest.v2+json', expectedDigest);
            let manifests = [manifest.value];
            if (Array.isArray(manifest.value.manifests)) {
              const descriptors = manifest.value.manifests.filter((item) => item?.platform?.architecture !== 'unknown' &&
                item?.annotations?.['vnd.docker.reference.type'] !== 'attestation-manifest');
              if (descriptors.length < 1 || descriptors.length > 4) throw new Error('registry platform set invalid');
              manifests = [];
              for (const descriptor of descriptors) {
                if (!digest(descriptor.digest)) throw new Error('registry descriptor invalid');
                manifests.push((await fetchRegistryJson(`manifests/${descriptor.digest}`, 131072,
                  'application/vnd.oci.image.manifest.v1+json, application/vnd.docker.distribution.manifest.v2+json', descriptor.digest)).value);
              }
            }
            let trusted = null;
            for (const item of manifests) {
              if (item?.schemaVersion !== 2 || !digest(item?.config?.digest) || !Array.isArray(item.layers) || item.layers.length > 256) throw new Error('registry manifest invalid');
              const config = (await fetchRegistryJson(`blobs/${item.config.digest}`, 262144,
                'application/vnd.oci.image.config.v1+json, application/vnd.docker.container.image.v1+json')).value;
              const labels = config?.config?.Labels;
              if (!plain(labels) || Object.keys(labels).length > 128 || Object.entries(labels).some(([key, value]) =>
                key.length > 256 || typeof value !== 'string' || value.length > 2048)) throw new Error('registry labels invalid');
              const selected = Object.fromEntries(['org.opencontainers.image.revision','org.opencontainers.image.created',
                'org.opencontainers.image.source','io.shifu.release.workflow'].map((key) => [key, labels[key]]));
              if (trusted && JSON.stringify(selected) !== JSON.stringify(trusted)) throw new Error('registry platform labels disagree');
              trusted = selected;
            }
            if (!trusted) throw new Error('registry labels missing');
            return trusted;
          }

          async function fetchRegistryJson(path, maxBytes, accept, expectedDigest) {
            const url = `https://ghcr.io/v2/shifu-ai/lobu-app/${path}`;
            let response = await fetch(url, { headers: { accept }, signal: AbortSignal.timeout(15000) });
            if (response.status === 401) {
              const challenge = response.headers.get('www-authenticate') ?? '';
              await response.body?.cancel();
              const match = challenge.match(/^Bearer realm="(https:\/\/ghcr\.io\/token)",service="(ghcr\.io)",scope="(repository:shifu-ai\/lobu-app:pull)"$/);
              if (!match) throw new Error('registry auth challenge invalid');
              const tokenResponse = await fetch(`${match[1]}?service=${encodeURIComponent(match[2])}&scope=${encodeURIComponent(match[3])}`,
                { signal: AbortSignal.timeout(15000) });
              const tokenBody = await boundedJson(tokenResponse, 16384);
              if (!plain(tokenBody) || typeof tokenBody.token !== 'string' || tokenBody.token.length > 8192) throw new Error('registry token invalid');
              response = await fetch(url, { headers: { accept, authorization: `Bearer ${tokenBody.token}` }, signal: AbortSignal.timeout(15000) });
            }
            if (expectedDigest && response.headers.get('docker-content-digest') !== expectedDigest) throw new Error('registry digest mismatch');
            return { value: await boundedJson(response, maxBytes) };
          }

          async function boundedJson(response, maxBytes) {
            if (!response.ok || !response.body) throw new Error('registry response unavailable');
            const declared = response.headers.get('content-length');
            if (declared && (!/^\d+$/.test(declared) || Number(declared) > maxBytes)) { await response.body.cancel(); throw new Error('registry response too large'); }
            const reader = response.body.getReader(); const chunks = []; let total = 0;
            while (true) { const item = await reader.read(); if (item.done) break; total += item.value.byteLength;
              if (total > maxBytes) { await reader.cancel(); throw new Error('registry response too large'); } chunks.push(item.value); }
            const value = JSON.parse(Buffer.concat(chunks).toString('utf8'));
            if (!plain(value)) throw new Error('registry response invalid');
            return value;
          }
          function plain(value) { return typeof value === 'object' && value !== null && !Array.isArray(value); }
          function digest(value) { return typeof value === 'string' && /^sha256:[0-9a-f]{64}$/.test(value); }
          NODE
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: lobu-app-signed-build-receipt
          path: lobu-app-signed-build-receipt.json
          if-no-files-found: error
          retention-days: 1

  publish-lobu-build-receipt:
    needs: [sign-lobu-build-receipt]
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: none
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: lobu-app-signed-build-receipt
      - name: Publish signed receipt without signing key
        env:
          TOOLBOX_INTERNAL_SECRET: ${{ secrets.TOOLBOX_INTERNAL_SECRET }}
          TOOLBOX_RECEIPT_INGRESS_URL: https://api.shifu-ai.org/agent-workbench/internal/agent-release-deployment-receipts
        run: |
          test "$(wc -c < lobu-app-signed-build-receipt.json)" -le 32768
          jq -e 'has("signing") and (.signing.signature | type == "string")' lobu-app-signed-build-receipt.json >/dev/null
          body="$(jq -c '{receipt:.}' lobu-app-signed-build-receipt.json)"
          for attempt in 1 2 3 4 5; do
            code="$(curl -sS -o /tmp/receipt-response -w '%{http_code}' -X POST "$TOOLBOX_RECEIPT_INGRESS_URL" -H 'content-type: application/json' -H "x-internal-secret: $TOOLBOX_INTERNAL_SECRET" --data-binary "$body")"
            test "$code" -ge 200 && test "$code" -lt 300 && exit 0
            sleep "$attempt"
          done
          exit 1

  build-worker:
    runs-on: ubuntu-latest
    # Gate the worker push (and transitively the app push, which `needs:
    # build-worker`) on the parity smoke passing.
    needs: [generate-tag, connector-parity-smoke]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Log in to Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_WORKER }}
          tags: |
            type=raw,value=${{ needs.generate-tag.outputs.tag }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Worker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          platforms: ${{ env.BUILD_PLATFORMS }}
          file: ./docker/worker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Share the buildx cache scope with the connector-parity-smoke job so
          # its amd64 layers are reused here (only the arm64 leg is new work).
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker

      - name: Make image public
        run: |
          curl -L -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/user/packages/container/lobu-worker/visibility \
            -d '{"visibility":"public"}' || true

  build-embeddings-service:
    runs-on: ubuntu-latest
    needs: [generate-tag]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Log in to Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_EMBEDDINGS }}
          tags: |
            type=raw,value=${{ needs.generate-tag.outputs.tag }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Embeddings Service image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          platforms: ${{ env.BUILD_PLATFORMS }}
          file: ./docker/embeddings-service/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Make image public
        run: |
          curl -L -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/user/packages/container/lobu-embeddings/visibility \
            -d '{"visibility":"public"}' || true

  # Failure notification. The chart applies one shared tag to app + worker +
  # embeddings, so if any of the three build/push jobs fails on main, the next
  # ImageUpdateAutomation cycle either rolls a tag that does not exist for one
  # service (half-rolled prod) or — when app fails after worker/embeddings
  # already pushed — silently leaves prod on the previous app tag while the
  # other two move forward. Both modes were caught only by manual inspection
  # before this notifier existed (PR #1116 build-app disk-full incident).
  #
  # Posts to the same Slack webhook the Flux notification-controller's
  # `slack-devops` Provider uses (devops channel) so cluster-side and CI-side
  # deploy failures land in one place. Webhook lives in the SLACK_DEPLOY_WEBHOOK_URL
  # repo secret; if unset the curl is skipped, never failing the job.
  notify-failure:
    runs-on: ubuntu-latest
    needs:
      [
        generate-tag,
        connector-parity-smoke,
        build-worker,
        build-embeddings-service,
        build-app,
      ]
    if: failure() && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - name: Post failure to Slack devops
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_DEPLOY_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          ACTOR: ${{ github.actor }}
          SHA_SHORT: ${{ github.sha }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_DEPLOY_WEBHOOK_URL not set; skipping notification."
            exit 0
          fi
          # First line of commit message only, JSON-escaped via jq.
          first_line=$(printf '%s' "$COMMIT_MSG" | head -n1)
          payload=$(jq -nc \
            --arg text "<@U09513HH1N1> :rotating_light: build-images failed on \`main\` — prod will roll half (or not at all). <${RUN_URL}|run> · <${COMMIT_URL}|${SHA_SHORT:0:7}> by ${ACTOR}\n> ${first_line}" \
            '{text: $text}')
          curl -sS -X POST -H 'Content-type: application/json' --data "$payload" "$SLACK_WEBHOOK_URL"
