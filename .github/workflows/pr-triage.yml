name: PR Triage

# Replaces claude-review.yml. Classifies each PR (auto-mergeable / needs-fixes /
# needs-human), applies mechanical fixes for needs-fixes, and enables auto-merge
# for auto-mergeable. Never uses --admin. See .claude/commands/triage-pr.md.

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened, labeled]
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to triage"
        required: true
        type: number

concurrency:
  group: pr-triage-${{ github.event.pull_request.number || github.event.issue.number || inputs.pr_number }}
  # IMPORTANT: do NOT cancel-in-progress. The agent's own label/comment events
  # create no-op runs that would otherwise cancel a real in-flight run mid-fix.
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    # Cheap event-level filters. The fork check (which needs an API call) lives
    # in the step body so it covers issue_comment / pull_request_review too.
    if: >
      (github.event_name != 'pull_request' || github.event.pull_request.draft == false) &&
      (github.event_name != 'pull_request' || github.event.action != 'labeled' || !startsWith(github.event.label.name, 'triage:')) &&
      (github.event_name != 'issue_comment' || github.event.issue.pull_request != null) &&
      (github.event_name != 'issue_comment' || github.event.comment.user.login != 'github-actions[bot]') &&
      (github.event_name != 'pull_request_review' || github.event.review.state != 'pending')
    outputs:
      proceed: ${{ steps.gate.outputs.proceed }}
      pr_number: ${{ steps.gate.outputs.pr_number }}
    steps:
      - id: gate
        env:
          EVENT: ${{ github.event_name }}
          PR_PR: ${{ github.event.pull_request.number }}
          PR_ISSUE: ${{ github.event.issue.number }}
          PR_INPUT: ${{ inputs.pr_number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          case "$EVENT" in
            pull_request|pull_request_review) num="$PR_PR" ;;
            issue_comment) num="$PR_ISSUE" ;;
            workflow_dispatch) num="$PR_INPUT" ;;
            *) echo "unsupported event $EVENT"; exit 1 ;;
          esac
          [ -n "$num" ] || { echo "no PR number resolved"; exit 1; }

          # Fork detection works for every event type.
          head_repo=$(gh pr view "$num" --repo "$GH_REPO" \
            --json headRepositoryOwner,headRepository \
            -q '(.headRepositoryOwner.login // "") + "/" + (.headRepository.name // "")')
          if [ "$head_repo" != "$GH_REPO" ]; then
            echo "fork PR (head=$head_repo) — skipping"
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "pr_number=$num" >> "$GITHUB_OUTPUT"
          echo "proceed=true" >> "$GITHUB_OUTPUT"

  triage:
    needs: setup
    if: needs.setup.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: submodule
        uses: ./.github/actions/setup-submodule
        with:
          deploy-key: ${{ secrets.OWLETTO_WEB_DEPLOY_KEY }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Configure git identity for fix commits
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Build triage prompt
        run: |
          mkdir -p /tmp/claude-prompts
          {
            echo "PR: ${{ needs.setup.outputs.pr_number }}"
            echo "Repo: ${{ github.repository }}"
            echo
            echo "Follow every phase of the procedure below. The procedure is the contract."
            echo "----- BEGIN /triage-pr -----"
            cat .claude/commands/triage-pr.md
            echo "----- END /triage-pr -----"
          } > /tmp/claude-prompts/prompt.txt

      - name: Run triage agent
        uses: anthropics/claude-code-base-action@beta
        with:
          prompt_file: /tmp/claude-prompts/prompt.txt
          allowed_tools: "Bash(gh pr:*),Bash(gh api:*),Bash(gh label:*),Bash(gh repo view:*),Bash(git fetch:*),Bash(git switch:*),Bash(git status),Bash(git diff:*),Bash(git add:*),Bash(git commit:*),Bash(git push:*),Bash(git reset:*),Bash(bun run check:fix),Bash(bun run typecheck),Bash(bun run build),Bash(bun run test:*),Bash(bun test:*),Bash(make build-packages),Bash(./scripts/slack-thread-viewer.js:*),Read,Edit,Write"
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          timeout_minutes: "15"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ needs.setup.outputs.pr_number }}
