name: PR Triage

# Replaces claude-review.yml. Classifies each PR (auto-mergeable / needs-fixes /
# needs-human), applies mechanical fixes for needs-fixes, and enables auto-merge
# for auto-mergeable. Never uses --admin. See .claude/commands/triage-pr.md.

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened, labeled]
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to triage"
        required: true
        type: number

concurrency:
  group: pr-triage-${{ github.event.pull_request.number || github.event.issue.number || inputs.pr_number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  checks: read
  actions: read

jobs:
  triage:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Skip when:
    # - draft PR (pull_request events only)
    # - issue_comment is not on a PR
    # - fork PR (head repo != base repo) — no write token, no secrets
    # - we triggered the event ourselves (label add, summary comment)
    if: >
      (github.event_name != 'pull_request' || github.event.pull_request.draft == false) &&
      (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) &&
      (github.event_name != 'pull_request' || github.event.action != 'labeled' || !startsWith(github.event.label.name, 'triage:')) &&
      (github.event_name != 'issue_comment' || github.event.issue.pull_request != null) &&
      (github.event_name != 'issue_comment' || github.event.comment.user.login != 'github-actions[bot]') &&
      (github.event_name != 'pull_request_review' || github.event.review.state != 'pending')
    steps:
      - name: Resolve PR number
        id: pr
        env:
          EVENT: ${{ github.event_name }}
          PR_PR: ${{ github.event.pull_request.number }}
          PR_ISSUE: ${{ github.event.issue.number }}
          PR_INPUT: ${{ inputs.pr_number }}
        run: |
          set -euo pipefail
          case "$EVENT" in
            pull_request|pull_request_review) num="$PR_PR" ;;
            issue_comment) num="$PR_ISSUE" ;;
            workflow_dispatch) num="$PR_INPUT" ;;
            *) echo "unsupported event $EVENT"; exit 1 ;;
          esac
          [ -n "$num" ] || { echo "no PR number resolved"; exit 1; }
          echo "number=$num" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: submodule
        uses: ./.github/actions/setup-submodule
        with:
          deploy-key: ${{ secrets.OWLETTO_WEB_DEPLOY_KEY }}

      - name: Skip on stubbed submodule (fork PR)
        if: steps.submodule.outputs.stubbed == 'true'
        run: |
          echo "Stubbed submodule — fork PR or missing deploy key. Exiting."
          exit 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Configure git identity for fix commits
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run triage agent
        uses: anthropics/claude-code-action@main
        with:
          direct_prompt: "/triage-pr ${{ steps.pr.outputs.number }}"
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_tools: "Bash(gh pr:*),Bash(gh api:*),Bash(gh label:*),Bash(gh repo view:*),Bash(git fetch:*),Bash(git switch:*),Bash(git status),Bash(git diff:*),Bash(git add:*),Bash(git commit:*),Bash(git push:*),Bash(git reset:*),Bash(bun run check:fix),Bash(bun run typecheck),Bash(bun run build),Bash(make build-packages),Bash(./scripts/slack-thread-viewer.js:*),mcp__github__get_pull_request_diff"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
