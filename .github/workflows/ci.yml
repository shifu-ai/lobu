name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  # Fast unit tests — no Postgres, no submodule needed for most.
  # Splits from `integration` so a unit failure surfaces in <2 min instead of
  # waiting behind DB setup. Worker tests run under bun (full suite, not the
  # cherry-picked subset that used to live here).
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-submodule
        with:
          deploy-key: ${{ secrets.OWLETTO_WEB_DEPLOY_KEY }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install bubblewrap (for embedded exec-sandbox tests)
        # The worker exec-sandbox uses bwrap on Linux; without it, the live
        # bwrap escape-matrix tests in `packages/agent-worker/src/__tests__/exec-sandbox.test.ts`
        # auto-skip and we lose the only Linux verification path.
        # Ubuntu 24.04 (ubuntu-latest) blocks unprivileged user namespaces via
        # AppArmor by default; bwrap needs them, so flip the sysctl. See
        # https://ubuntu.com/blog/ubuntu-23-10-restricted-unprivileged-user-namespaces
        run: |
          sudo apt-get update
          sudo apt-get install -y bubblewrap coreutils
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          bwrap --version
          ls -la /usr/bin/true /bin/true 2>&1 || true
          # Probe with multiple bind mounts. /bin and /usr/bin are sometimes the
          # same symlinked tree, sometimes not, depending on distro layout.
          bwrap --unshare-user --unshare-pid \
            --ro-bind / / \
            --proc /proc --dev /dev \
            -- /usr/bin/true && echo "bwrap userns OK"

      - name: Install dependencies
        run: bun install

      - name: Connector runtime deps tripwire
        # Catches "added a dep to the compiler's external list but forgot to
        # install it in the worker runtime image" before it ships.
        run: node scripts/check-connector-runtime-deps.mjs

      - name: Build core + sdk + embeddings + connector-worker for downstream type-resolution
        # connector-worker integration tests import from its compiled `dist/`
        # (subprocess-mode tests spawn the built executor); build it here
        # so those run. embeddings must build before connector-worker —
        # connector-worker's src/embeddings.ts imports from @lobu/embeddings
        # and resolves it via the workspace symlink → dist.
        run: |
          cd packages/core && bun run build && cd ../..
          cd packages/connector-sdk && bun run build && cd ../..
          cd packages/embeddings && bun run build && cd ../..
          cd packages/connector-worker && bun run build && cd ../..

      - name: core / cli (bun:test)
        run: bun test packages/core packages/cli --coverage

      - name: worker (bun:test, full suite)
        # The previous CI cherry-picked 8 of 18 files because pi-coding-agent
        # was thought to fail under bun on Linux. Locally the full suite
        # passes; if Linux turns out different we'll narrow this back down,
        # but we own the WASM concern via run-script-runtime.test.ts under
        # Node + isolated-vm in the integration job below.
        run: bun test packages/agent-worker

      - name: server (bun:test units)
        # The gateway code that used to live in packages/gateway is now under
        # src/gateway/. Its DB-backed bun:test suite needs Postgres and runs
        # in the integration job below; here we only run the pure-unit
        # subdirectories that don't touch Postgres.
        run: |
          bun test packages/server/src/__tests__/unit
          bun test packages/server/src/auth/__tests__/tool-access.test.ts
          bun test packages/server/src/gateway/infrastructure/queue

      - name: connector-worker (bun:test)
        # openclaw-plugin e2e tests need a live backend and belong in the
        # smoke-example workflow, not the unit job.
        run: |
          bun test packages/connector-worker

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false

  # Frontend tests run under jsdom via vitest. owletto-web is a submodule;
  # forks without the deploy key get a stub package and skip these.
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - id: submodule
        uses: ./.github/actions/setup-submodule
        with:
          deploy-key: ${{ secrets.OWLETTO_WEB_DEPLOY_KEY }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        if: steps.submodule.outputs.stubbed != 'true'
        run: bun install

      - name: Build core + connector-sdk (owletto-web imports their compiled dist)
        # connector-sdk imports @lobu/core; resolving the type-only barrel
        # import needs core/dist on disk first.
        if: steps.submodule.outputs.stubbed != 'true'
        run: |
          cd packages/core && bun run build && cd ../..
          cd packages/connector-sdk && bun run build && cd ../..

      - name: owletto-web tests (vitest)
        # owletto-web doesn't define a `test` script in its package.json yet
        # (that change ships as a separate submodule PR). Invoke vitest
        # directly via the workspace-installed binary so this works on
        # whatever submodule SHA the parent repo points at.
        if: steps.submodule.outputs.stubbed != 'true'
        run: cd packages/web && ../../node_modules/.bin/vitest run

  # Backend integration tests need a real Postgres + pgvector. We run them
  # under Node (not bun) for two reasons: (1) the vitest suite uses Node-only
  # APIs in places, and (2) the sandbox runtime requires isolated-vm which
  # is a V8 native addon that bun cannot load.
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lobu_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5433/lobu_test
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-submodule
        with:
          deploy-key: ${{ secrets.OWLETTO_WEB_DEPLOY_KEY }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      # Pin Node 22 so isolated-vm's abi127 prebuild loads. Without this the
      # sandbox runtime test segfaults on the runner's default Node major.
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: bun install

      - name: Build packages server depends on
        run: |
          cd packages/core && bun run build && cd ../..
          cd packages/connector-sdk && bun run build && cd ../..

      - name: Verify Postgres health (fail fast if pgvector setup is broken)
        run: |
          for i in {1..20}; do
            if pg_isready -h 127.0.0.1 -p 5433 -U postgres; then break; fi
            sleep 1
          done
          PGPASSWORD=postgres psql -h 127.0.0.1 -p 5433 -U postgres -d lobu_test \
            -c "CREATE EXTENSION IF NOT EXISTS vector"

      - name: server integration suite (vitest under Node)
        working-directory: packages/server
        run: node ../../node_modules/.bin/vitest run --reporter=default

      - name: server gateway suite (bun:test, needs Postgres)
        # The gateway code that used to live in packages/gateway is now under
        # src/gateway/__tests__/. These bun:test files are excluded from
        # vitest (see vitest.config.ts) and need a real Postgres, so they run
        # here in the integration job.
        working-directory: packages/server
        run: bun test src/gateway/__tests__

      - name: server lobu route suite (bun:test, needs Postgres)
        # These bun:test files live outside src/gateway and are also excluded
        # from vitest because they import bun:test directly.
        working-directory: packages/server
        run: bun test src/lobu/__tests__ src/workspace/__tests__

  format-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-submodule
        with:
          deploy-key: ${{ secrets.OWLETTO_WEB_DEPLOY_KEY }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        run: bun install

      - name: Run biome format check
        run: bun run format:check

      - name: Run biome lint check
        run: bun run lint

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-submodule
        with:
          deploy-key: ${{ secrets.OWLETTO_WEB_DEPLOY_KEY }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        run: bun install

      - name: Build workspace packages (needed for downstream tsc resolution)
        run: make build-packages

      - name: Run TypeScript type check
        run: bun run typecheck

      - name: Type check packages excluded from root tsconfig
        # Root tsconfig excludes these packages, so `bun run typecheck`
        # above never sees them. Run each package's own tsc here so a
        # type error can't reach main and break the npm publish at
        # release time. connectors and landing are intentionally
        # left out — they need preconditions (DOM lib, `astro sync`)
        # that belong to their own build pipelines.
        run: |
          set -euo pipefail
          for pkg in server connector-worker connector-sdk openclaw-plugin embeddings cli; do
            echo "::group::typecheck $pkg"
            (cd "packages/$pkg" && bunx tsc --noEmit)
            echo "::endgroup::"
          done

  migrations:
    # Catches the class of bug that has now broken prod twice in one
    # session: a migration file that's syntactically a SQL file but that
    # `dbmate up` rejects (missing -- migrate:up directive, constraint
    # violations against legacy data, etc.). Runs every migration in
    # order against an empty Postgres on every PR.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lobu_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Lint migration directives
        # Sub-second pre-flight: every file under db/migrations/ must
        # contain `-- migrate:up`. Catches the most common authoring
        # mistake before we even spin up Postgres.
        run: |
          missing=$(grep -L '^-- migrate:up' db/migrations/*.sql || true)
          if [ -n "$missing" ]; then
            echo "::error::Migrations missing '-- migrate:up' directive:"
            echo "$missing"
            exit 1
          fi

      - name: Migration immutability — fail on edits to applied migrations
        # dbmate keys migrations by their version filename. Once a migration
        # has shipped to main, editing it silently no-ops in any environment
        # whose schema_migrations row already lists that version (i.e. prod).
        # The fresh-Postgres `dbmate up` below applies the latest text of every
        # file and stays green, so edits-after-apply are invisible to that job.
        # Fail the PR when a migration file changes (rather than is added)
        # relative to main; force authors to ship a new dated file instead.
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          edited=$(git diff --name-only --diff-filter=MRD "$BASE_SHA"...HEAD -- db/migrations/ || true)
          if [ -n "$edited" ]; then
            echo "::error::Migration files were modified or renamed — applied migrations are immutable. Add a new dated migration instead."
            echo "$edited"
            exit 1
          fi

      - name: Install dbmate
        run: |
          curl -fsSL -o /usr/local/bin/dbmate \
            https://github.com/amacneil/dbmate/releases/download/v2.21.0/dbmate-linux-amd64
          chmod +x /usr/local/bin/dbmate

      - name: Apply all migrations against an empty Postgres
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/lobu_ci?sslmode=disable
        # `dbmate up` dumps `db/schema.sql` after running. The drift check below
        # diffs that file against the committed version after stripping volatile
        # lines (see `scripts/normalize-schema.sh`).
        run: dbmate --migrations-dir db/migrations --schema-file db/schema.sql up

      - name: Verify migrations are listed in the schema_migrations table
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/lobu_ci?sslmode=disable
        run: |
          dbmate --migrations-dir db/migrations status
          # Fail if any pending remain
          pending=$(dbmate --migrations-dir db/migrations status | grep -c '^\[ \]' || true)
          if [ "$pending" != "0" ]; then
            echo "::error::$pending migrations still pending after dbmate up"
            exit 1
          fi

      - name: Normalize generated schema.sql for comparison
        # pg_dump emits non-deterministic / env-dependent lines that vary
        # across pg_dump versions and runs: `\restrict <random_token>`,
        # `\unrestrict <random_token>`, `-- Dumped from database version ...`,
        # `-- Dumped by pg_dump version ...`, and `SET transaction_timeout = 0;`
        # (pg17+ only). Strip them so the drift check is purely about the
        # actual schema. The committed `db/schema.sql` is in the same stripped
        # form; devs reproducing locally should run `scripts/normalize-schema.sh
        # db/schema.sql` after `dbmate ... dump`.
        run: scripts/normalize-schema.sh db/schema.sql

      - name: Schema snapshot drift — db/schema.sql must match `dbmate up` output
        # Independent backstop against editing applied migrations. The
        # immutability check above looks at the migration file set; this looks
        # at the end-state schema. They catch the same class of bug from
        # opposite sides — a buggy edit could in principle pass one and trip
        # the other (e.g. rename + edit). Failure mode is concrete: regenerate
        # `db/schema.sql` locally (`dbmate --schema-file db/schema.sql dump`),
        # run `scripts/normalize-schema.sh db/schema.sql`, and commit.
        run: |
          if ! git diff --exit-code -- db/schema.sql; then
            echo "::error::db/schema.sql is stale. Regenerate with \`dbmate --migrations-dir db/migrations --schema-file db/schema.sql dump && scripts/normalize-schema.sh db/schema.sql\` and commit the result."
            exit 1
          fi
