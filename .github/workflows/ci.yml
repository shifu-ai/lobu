name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  # Fast unit tests — no Postgres, no submodule needed for most.
  # Splits from `integration` so a unit failure surfaces in <2 min instead of
  # waiting behind DB setup. Worker tests run under bun (full suite, not the
  # cherry-picked subset that used to live here).
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-submodule
        with:
          deploy-key: ${{ secrets.OWLETTO_WEB_DEPLOY_KEY }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install bubblewrap (for embedded exec-sandbox tests)
        # The worker exec-sandbox uses bwrap on Linux; without it, the live
        # bwrap escape-matrix tests in `packages/agent-worker/src/__tests__/exec-sandbox.test.ts`
        # auto-skip and we lose the only Linux verification path.
        # Ubuntu 24.04 (ubuntu-latest) blocks unprivileged user namespaces via
        # AppArmor by default; bwrap needs them, so flip the sysctl. See
        # https://ubuntu.com/blog/ubuntu-23-10-restricted-unprivileged-user-namespaces
        run: |
          sudo apt-get update
          sudo apt-get install -y bubblewrap coreutils
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          bwrap --version
          ls -la /usr/bin/true /bin/true 2>&1 || true
          # Probe with multiple bind mounts. /bin and /usr/bin are sometimes the
          # same symlinked tree, sometimes not, depending on distro layout.
          bwrap --unshare-user --unshare-pid \
            --ro-bind / / \
            --proc /proc --dev /dev \
            -- /usr/bin/true && echo "bwrap userns OK"

      - name: Install dependencies
        run: bun install

      - name: Connector runtime deps tripwire
        # Catches "added a dep to the compiler's external list but forgot to
        # install it in the worker runtime image" before it ships.
        run: node scripts/check-connector-runtime-deps.mjs

      - name: Build core + sdk + embeddings + connector-worker for downstream type-resolution
        # connector-worker integration tests import from its compiled `dist/`
        # (subprocess-mode tests spawn the built executor); build it here
        # so those run. embeddings must build before connector-worker —
        # connector-worker's src/embeddings.ts imports from @lobu/embeddings
        # and resolves it via the workspace symlink → dist.
        run: |
          cd packages/core && bun run build && cd ../..
          cd packages/connector-sdk && bun run build && cd ../..
          cd packages/sdk && bun run build && cd ../..
          cd packages/embeddings && bun run build && cd ../..
          cd packages/connector-worker && bun run build && cd ../..

      - name: core / cli (bun:test)
        run: bun test packages/core packages/cli --coverage

      - name: worker (bun:test, full suite)
        # The previous CI cherry-picked 8 of 18 files because pi-coding-agent
        # was thought to fail under bun on Linux. Locally the full suite
        # passes; if Linux turns out different we'll narrow this back down,
        # but we own the WASM concern via run-script-runtime.test.ts under
        # Node + isolated-vm in the integration job below.
        run: bun test packages/agent-worker

      - name: server (bun:test units)
        # The gateway code that used to live in packages/gateway is now under
        # src/gateway/. Its DB-backed bun:test suite needs Postgres and runs
        # in the integration job below; here we only run the pure-unit
        # subdirectories that don't touch Postgres.
        run: |
          bun test packages/server/src/__tests__/unit
          bun test packages/server/src/auth/__tests__/tool-access.test.ts
          bun test packages/server/src/gateway/infrastructure/queue

      - name: connector-worker (bun:test)
        # openclaw-plugin e2e tests need a live backend and belong in the
        # smoke-example workflow, not the unit job.
        run: |
          bun test packages/connector-worker

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false

  # SDK lifecycle e2e — the hard gate that the WHOLE TypeScript-SDK path runs,
  # not just that config maps (unit/integration cover that). Boots `lobu run`
  # (embedded Postgres — the linux binary ships as an @embedded-postgres
  # optional dep, the same engine prod uses), auto-applies a prune:true fixture,
  # and drives a real agent turn through a spawned worker against a deterministic
  # mock OpenAI-compatible provider (no provider key needed). A failure here
  # fails CI → the PR goes red. See scripts/sdk-e2e.sh.
  sdk-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-submodule
        with:
          deploy-key: ${{ secrets.OWLETTO_WEB_DEPLOY_KEY }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      # Node 22 — the worker uses isolated-vm (abi127 prebuild); the runner's
      # default Node major would segfault the sandbox runtime.
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: bun install

      # `lobu run`'s embedded Postgres ships a PG18 binary dynamically linked
      # against ICU 60 (libicuuc.so.60); ubuntu-latest carries a newer ICU, so
      # initdb can't load without the 18.04-era lib. Prod doesn't hit this (it
      # uses an external Postgres and prunes embedded-postgres), but the local
      # `lobu run` path this gate exercises does. Install it from the Ubuntu
      # archive (mirror fallback) and surface any remaining missing libs.
      - name: Install libicu60 (embedded-postgres links against ICU 60)
        run: |
          set -euo pipefail
          deb=libicu60_60.2-3ubuntu3.2_amd64.deb
          curl -fsSL -o "/tmp/$deb" "http://archive.ubuntu.com/ubuntu/pool/main/i/icu/$deb" \
            || curl -fsSL -o "/tmp/$deb" "http://security.ubuntu.com/ubuntu/pool/main/i/icu/$deb"
          sudo dpkg -i "/tmp/$deb"
          ldconfig -p | grep -i libicuuc
          echo "::group::ldd of embedded-postgres initdb"
          ldd node_modules/@embedded-postgres/linux-x64/native/bin/initdb || true
          echo "::endgroup::"

      - name: Build all packages (CLI + server bundle + sdk + pgvector-embedded)
        run: make build-packages

      - name: SDK lifecycle e2e (apply + prune + real worker turn)
        run: bash scripts/sdk-e2e.sh

  # Frontend tests run under jsdom via vitest. owletto is a submodule;
  # forks without the deploy key get a stub package and skip these.
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - id: submodule
        uses: ./.github/actions/setup-submodule
        with:
          deploy-key: ${{ secrets.OWLETTO_WEB_DEPLOY_KEY }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        if: steps.submodule.outputs.stubbed != 'true'
        run: bun install

      - name: Build core + connector-sdk (owletto imports their compiled dist)
        # connector-sdk imports @lobu/core; resolving the type-only barrel
        # import needs core/dist on disk first.
        if: steps.submodule.outputs.stubbed != 'true'
        run: |
          cd packages/core && bun run build && cd ../..
          cd packages/connector-sdk && bun run build && cd ../..

      - name: owletto tests (vitest)
        # owletto doesn't define a `test` script in its package.json yet
        # (that change ships as a separate submodule PR). Invoke vitest
        # directly via the workspace-installed binary so this works on
        # whatever submodule SHA the parent repo points at.
        if: steps.submodule.outputs.stubbed != 'true'
        run: cd packages/owletto && ../../node_modules/.bin/vitest run

  # Backend integration tests need a real Postgres + pgvector. We run them
  # under Node (not bun) for two reasons: (1) the vitest suite uses Node-only
  # APIs in places, and (2) the sandbox runtime requires isolated-vm which
  # is a V8 native addon that bun cannot load.
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lobu_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5433/lobu_test
      # The integration suite runs all 70+ test files in a single forked
      # process (vitest.config.ts: pool:'forks', singleFork:true). With the
      # production default of `DB_POOL_MAX=20` plus the test pool's `max:5`
      # the suite has ~26 sockets to play with — fine on its own, but
      # `idle_timeout:0` in db/client.ts keeps every connection forever, so
      # any transient burst across 750+ tests accumulates and the singleton
      # pgvector image (max_connections=100) starts rejecting with
      # "sorry, too many clients already" deep into the run.
      # Capping the app pool to 5 keeps the worst-case socket count at
      # 5 (app) + 5 (test) + 1 (LISTEN) = 11, well below the CI budget.
      DB_POOL_MAX: '5'
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-submodule
        with:
          deploy-key: ${{ secrets.OWLETTO_WEB_DEPLOY_KEY }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      # Pin Node 22 so isolated-vm's abi127 prebuild loads. Without this the
      # sandbox runtime test segfaults on the runner's default Node major.
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: bun install

      - name: Build packages server depends on
        # embeddings → connector-worker order matters: connector-worker's
        # src/embeddings.ts imports `@lobu/embeddings` and resolves it via
        # the workspace symlink → dist. connector-worker itself is required
        # because `packages/server/src/utils/connector-catalog.ts` imports
        # `@lobu/connector-worker/compile` (the shared compile pipeline),
        # which resolves via the package's `exports` field to
        # `./dist/compile/index.js`. Vitest's vite-node resolver follows
        # the `import` condition and fails to load if dist is absent —
        # which transitively breaks every integration file whose import
        # graph touches `queue-helpers` / `worker-api` / `connector-catalog`.
        #
        # pgvector-embedded must build too: the test backend
        # (src/__tests__/setup/embedded-postgres-backend.ts) imports
        # `@lobu/pgvector-embedded`, so vite resolves its `import` condition
        # (./dist/index.js) at transform time even though the embedded backend
        # is never started when DATABASE_URL points at the external Postgres.
        run: |
          cd packages/core && bun run build && cd ../..
          cd packages/connector-sdk && bun run build && cd ../..
          cd packages/embeddings && bun run build && cd ../..
          cd packages/connector-worker && bun run build && cd ../..
          cd packages/pgvector-embedded && bun run build && cd ../..

      - name: Verify Postgres health (fail fast if pgvector setup is broken)
        run: |
          for i in {1..20}; do
            if pg_isready -h 127.0.0.1 -p 5433 -U postgres; then break; fi
            sleep 1
          done
          PGPASSWORD=postgres psql -h 127.0.0.1 -p 5433 -U postgres -d lobu_test \
            -c "CREATE EXTENSION IF NOT EXISTS vector"

      - name: server integration suite (vitest under Node)
        working-directory: packages/server
        run: node ../../node_modules/.bin/vitest run --reporter=default

      - name: server gateway suite (bun:test, needs Postgres)
        # The gateway code that used to live in packages/gateway is now under
        # src/gateway/__tests__/. These bun:test files are excluded from
        # vitest (see vitest.config.ts) and need a real Postgres, so they run
        # here in the integration job.
        working-directory: packages/server
        run: bun test src/gateway/__tests__

      - name: server lobu route suite (bun:test, needs Postgres)
        # These bun:test files live outside src/gateway and are also excluded
        # from vitest because they import bun:test directly.
        working-directory: packages/server
        run: bun test src/lobu/__tests__ src/workspace/__tests__

  format-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-submodule
        with:
          deploy-key: ${{ secrets.OWLETTO_WEB_DEPLOY_KEY }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        run: bun install

      - name: Run biome format check
        run: bun run format:check

      - name: Run biome lint check
        run: bun run lint

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-submodule
        with:
          deploy-key: ${{ secrets.OWLETTO_WEB_DEPLOY_KEY }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        run: bun install

      - name: Build workspace packages (needed for downstream tsc resolution)
        run: make build-packages

      - name: Run TypeScript type check
        run: bun run typecheck

      - name: Type check packages excluded from root tsconfig
        # Root tsconfig excludes these packages, so `bun run typecheck`
        # above never sees them. Run each package's own tsc here so a
        # type error can't reach main and break the npm publish at
        # release time. connectors and landing are intentionally
        # left out — they need preconditions (DOM lib, `astro sync`)
        # that belong to their own build pipelines.
        run: |
          set -euo pipefail
          for pkg in server connector-worker connector-sdk openclaw-plugin embeddings cli; do
            echo "::group::typecheck $pkg"
            (cd "packages/$pkg" && bunx tsc --noEmit)
            echo "::endgroup::"
          done

  migrations:
    # Catches the class of bug that has now broken prod twice in one
    # session: a migration file that's syntactically a SQL file but that
    # `dbmate up` rejects (missing -- migrate:up directive, constraint
    # violations against legacy data, etc.). Runs every migration in
    # order against an empty Postgres on every PR.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lobu_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Lint migration directives
        # Sub-second pre-flight: every file under db/migrations/ must
        # contain `-- migrate:up`. Catches the most common authoring
        # mistake before we even spin up Postgres.
        run: |
          missing=$(grep -L '^-- migrate:up' db/migrations/*.sql || true)
          if [ -n "$missing" ]; then
            echo "::error::Migrations missing '-- migrate:up' directive:"
            echo "$missing"
            exit 1
          fi

      - name: Migration immutability — fail on edits to applied migrations
        # dbmate keys migrations by their version filename. Once a migration
        # has shipped to main, editing it silently no-ops in any environment
        # whose schema_migrations row already lists that version (i.e. prod).
        # Fail the PR when a migration file changes (rather than is added)
        # relative to main; force authors to ship a new dated migration instead.
        #
        # Exceptions:
        #   1. The baseline at 00000000000000_baseline.sql may be regenerated
        #      by re-running the squash workflow (always modifiable).
        #   2. PRs whose commit message contains the explicit sentinel
        #      `[squash-baseline]` may delete the forward-delta migration
        #      files that were collapsed into the baseline. This is a
        #      one-time-per-squash exception and code review is the gate.
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          if git log "$BASE_SHA"..HEAD --format=%B | grep -qF '[squash-baseline]'; then
            echo "[squash-baseline] sentinel present; immutability check is skipped for this PR."
            exit 0
          fi
          edited=$(git diff --name-only --diff-filter=MRD "$BASE_SHA"...HEAD -- db/migrations/ \
            | grep -v '^db/migrations/00000000000000_baseline\.sql$' || true)
          if [ -n "$edited" ]; then
            echo "::error::Migration files were modified or renamed — applied migrations are immutable (only db/migrations/00000000000000_baseline.sql is excluded). Add a new dated migration instead."
            echo "$edited"
            exit 1
          fi

      - name: Install dbmate
        run: |
          curl -fsSL -o /usr/local/bin/dbmate \
            https://github.com/amacneil/dbmate/releases/download/v2.21.0/dbmate-linux-amd64
          chmod +x /usr/local/bin/dbmate

      - name: Apply all migrations against an empty Postgres
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/lobu_ci?sslmode=disable
        # The baseline migration plus any forward deltas must apply cleanly
        # to a fresh DB. That's the only schema check left after the squash —
        # db/schema.sql + the drift-gate-vs-baseline diff are gone since the
        # baseline IS the canonical schema.
        run: dbmate --migrations-dir db/migrations up

      - name: Verify migrations are listed in the schema_migrations table
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/lobu_ci?sslmode=disable
        run: |
          dbmate --migrations-dir db/migrations status
          # Fail if any pending remain
          pending=$(dbmate --migrations-dir db/migrations status | grep -c '^\[ \]' || true)
          if [ "$pending" != "0" ]; then
            echo "::error::$pending migrations still pending after dbmate up"
            exit 1
          fi

  # Path-filter for the Mac smoke build, isolated to a cheap ubuntu runner
  # so skipped PRs don't allocate a macOS runner just to evaluate the diff.
  # `github.event.pull_request.changed_files` in the webhook payload is an
  # integer (the count of changed files), not a list — `contains()` over it
  # never matches. Use git diff against the PR base instead. On push events
  # (main) there's no PR object, so default to running the smoke job.
  mac-build-smoke-filter:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.filter.outputs.run }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Need the PR base commit so we can diff against it. The default
          # fetch-depth=1 only has HEAD.
          fetch-depth: 0

      - name: Decide whether to run the Mac smoke build
        id: filter
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          if [ -z "${BASE_SHA:-}" ]; then
            # push to main (or any non-PR trigger) — always run.
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed=$(git diff --name-only "$BASE_SHA"...HEAD)
          if echo "$changed" | grep -E '^(packages/owletto($|/)|\.github/workflows/mac-release\.yml$|\.github/actions/setup-submodule(/|$)|\.gitmodules$)' >/dev/null; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No paths affecting the Mac build changed — skipping mac-build-smoke."
          fi

  # Cheap end-to-end Xcode build for the Mac app. `mac-release.yml` is
  # workflow_dispatch only, so a rename or path move inside the owletto
  # submodule (Mac source lives at `packages/owletto/apps/mac/`) can silently
  # break the release pipeline and only surface the next time someone
  # triggers a release. Build-only (no archive, no signing, no notarize)
  # is enough to prove the Xcode project + submodule layout still compose.
  #
  # Runner cost is bounded by the filter job above — the macOS runner is
  # only allocated when the submodule pointer, the release workflow, the
  # submodule setup action, or `.gitmodules` changes.
  mac-build-smoke:
    needs: mac-build-smoke-filter
    if: needs.mac-build-smoke-filter.outputs.run == 'true'
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - id: submodule
        uses: ./.github/actions/setup-submodule
        with:
          deploy-key: ${{ secrets.OWLETTO_WEB_DEPLOY_KEY }}

      # Forks (and any run where the secret isn't available) get a stub
      # package.json from setup-submodule. There's no Mac source to build
      # there, so skip the rest gracefully rather than fail. Same-repo PRs
      # and push events both have the key, so a stub there means the secret
      # is misconfigured — fail loudly.
      - name: Fail fast if submodule is stubbed (same-repo PRs and push)
        if: steps.submodule.outputs.stubbed == 'true' && !(github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository)
        run: |
          echo "::error::Mac source unreachable — OWLETTO_WEB_DEPLOY_KEY missing or invalid."
          exit 1

      - name: Skip on fork PRs without submodule access
        if: steps.submodule.outputs.stubbed == 'true' && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        run: echo "::notice::Submodule stubbed on fork PR — skipping Mac smoke build."

      - name: Build (unsigned, no archive)
        if: steps.submodule.outputs.stubbed != 'true'
        run: |
          xcodebuild \
            -project packages/owletto/apps/mac/Owletto.xcodeproj \
            -scheme Owletto -configuration Release build \
            CODE_SIGNING_ALLOWED=NO
