name: mac-release

# Builds and ships Owletto for Mac, then attaches Owletto.dmg to the existing
# `lobu-v<version>` GitHub Release (so releases/latest/download/Owletto.dmg always
# resolves) and signs an entry into the Sparkle appcast so installed apps can
# auto-update.
#
# The Mac source lives in the private `lobu-ai/owletto` repo, mounted here as
# the `packages/owletto` submodule. Releases ship from this (public) repo so the
# DMG download URL and Sparkle appcast URL stay reachable to anonymous users —
# private-repo Releases would 404 without auth.
#
# Two modes, picked automatically from whether the Developer ID cert secret is
# set — adding the secrets is the *only* thing needed to flip from stopgap to
# production; nothing in this file changes:
#
#   • SIGNED (production)  — APPLE_CERT_P12_BASE64 present: Developer ID
#       codesign + hardened runtime + notarize + staple. DMG opens with no
#       Gatekeeper warning.
#   • UNSIGNED (stopgap)   — that secret empty: ad-hoc-signed app, no
#       notarization. Works, but the first launch needs right-click → Open
#       ("unidentified developer"). This is what runs until the Apple Developer
#       Program membership + Developer ID cert exist.
#
# ── To switch to SIGNED: add these repo secrets, that's it ──────────────────
#   APPLE_CERT_P12_BASE64   base64 of a "Developer ID Application" .p12
#   APPLE_CERT_PASSWORD     password for that .p12
#   APPLE_TEAM_ID           10-char Apple Developer team id
#   APPLE_ID                Apple ID email used for notarization
#   APPLE_APP_PASSWORD      app-specific password for that Apple ID
#
# No provisioning profile is required — the app ships only standard
# entitlements (the HealthKit entitlement is disabled; see
# packages/owletto/apps/mac/Lobu/Lobu.entitlements in the owletto submodule).
#
# Sparkle auto-updates: `SPARKLE_ED_PRIVATE_KEY` (64-byte base64 of seed||pub)
# is required. The job signs Owletto.dmg with `sign_update` and pushes a new
# <item> into appcast.xml on the gh-pages branch (served at
# https://lobu-ai.github.io/lobu/appcast.xml — that URL is in Info.plist as
# SUFeedURL). Public key is in Info.plist:SUPublicEDKey.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, e.g. 0.42.0 (must have a lobu-v<version> release)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      # Mac source lives in the owletto submodule; need the deploy key to clone.
      - id: submodule
        uses: ./.github/actions/setup-submodule
        with:
          deploy-key: ${{ secrets.OWLETTO_WEB_DEPLOY_KEY }}

      # Release contract — fail fast rather than build a wrong/missing artifact:
      #   1. The deploy key must work. The setup-submodule action writes a stub
      #      package.json when the key is absent; that's fine for CI on forks but
      #      catastrophic for a release (we'd ship an empty DMG or fail late on
      #      a missing project). Make it fatal here.
      #   2. The submodule must point at lobu-ai/owletto. If the URL drifted we
      #      could be releasing the wrong codebase entirely.
      #   3. The Mac Xcode project + bundle paths the rest of this workflow
      #      assumes must actually exist at the pinned SHA. Otherwise the
      #      `lobster-mark.svg` → `owletto-mark.svg` style of silent rename on
      #      the owletto side would only surface inside `xcodebuild`.
      #   4-7. The scheme name, app display name, bundle identifier, and
      #      Sparkle public key must match what the rest of the workflow and
      #      installed apps depend on. A rename inside owletto (e.g. scheme
      #      `Lobu` → `Owletto`, bundle id `ai.lobu.mac` → `ai.owletto.mac`)
      #      would pass the path checks above but break the build or, worse,
      #      silently break auto-update for installed users.
      - name: Verify release contract (submodule + Mac source layout)
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ steps.submodule.outputs.stubbed }}" = "true" ]; then
            echo "::error::Submodule was stubbed — OWLETTO_WEB_DEPLOY_KEY is missing or invalid. Aborting release."
            exit 1
          fi
          remote_url=$(git -C packages/owletto config --get remote.origin.url)
          case "$remote_url" in
            *lobu-ai/owletto.git|*lobu-ai/owletto) ;;
            *)
              echo "::error::packages/owletto origin is '$remote_url' — expected lobu-ai/owletto. Aborting release."
              exit 1
              ;;
          esac
          for required in \
            packages/owletto/apps/mac/Lobu.xcodeproj \
            packages/owletto/apps/mac/Lobu/Info.plist \
            scripts/sparkle/update-appcast.py
          do
            if [ ! -e "$required" ]; then
              echo "::error::Required release path missing: $required"
              exit 1
            fi
          done

          # 4. The Xcode scheme must still be named 'Lobu'. The rest of this
          #    workflow passes `-scheme Lobu` to xcodebuild; if owletto renames
          #    the scheme (e.g. to 'Owletto') the path checks above still pass
          #    and we'd only find out late inside xcodebuild.
          #
          #    Scope the check to the schemes list via `-list -json`. The plain
          #    `-list` text output has both `Targets:` and `Schemes:` sections,
          #    so a `grep '^  Lobu$'` could match a target named 'Lobu' even
          #    after the scheme was renamed to 'Owletto'.
          SCHEMES=$(xcodebuild -project packages/owletto/apps/mac/Lobu.xcodeproj -list -json 2>/dev/null \
            | python3 -c "import json,sys; print('\n'.join(json.load(sys.stdin)['project']['schemes']))")
          if ! echo "$SCHEMES" | grep -qE '^Lobu$'; then
            echo "::error::Expected scheme 'Lobu' missing from project schemes (got: $SCHEMES)"
            exit 1
          fi

          # 5. CFBundleName + CFBundleDisplayName must stay 'Owletto'. These
          #    are what users see in Finder / the menu bar / "About"; a silent
          #    rename here would ship a DMG that installs as a different app
          #    next to existing installs.
          EXPECTED_BUNDLE_NAME="Owletto"
          for key in CFBundleName CFBundleDisplayName; do
            actual=$(/usr/libexec/PlistBuddy -c "Print :$key" \
              packages/owletto/apps/mac/Lobu/Info.plist 2>/dev/null || true)
            if [ "$actual" != "$EXPECTED_BUNDLE_NAME" ]; then
              echo "::error::Info.plist:$key is '$actual', expected '$EXPECTED_BUNDLE_NAME'"
              exit 1
            fi
          done

          # 6. PRODUCT_BUNDLE_IDENTIFIER in project.pbxproj must stay
          #    ai.lobu.mac across ALL build configurations. CFBundleIdentifier
          #    in Info.plist resolves to $(PRODUCT_BUNDLE_IDENTIFIER) at build
          #    time, so the real value lives in the pbxproj build settings.
          #    The URL scheme, Keychain service name, and Sparkle update path
          #    are all keyed off this — a change here breaks the upgrade
          #    contract for installed apps.
          #
          #    Assert the set of distinct values is exactly {ai.lobu.mac}, not
          #    "some occurrence equals ai.lobu.mac". A simple grep would still
          #    pass if one config drifted while another stale occurrence stayed
          #    correct.
          EXPECTED_BUNDLE_ID="ai.lobu.mac"
          distinct_ids=$(grep -E 'PRODUCT_BUNDLE_IDENTIFIER = ' \
            packages/owletto/apps/mac/Lobu.xcodeproj/project.pbxproj \
            | sed -E 's/.*PRODUCT_BUNDLE_IDENTIFIER = ([^;]+);.*/\1/' \
            | sort -u)
          if [ "$distinct_ids" != "$EXPECTED_BUNDLE_ID" ]; then
            echo "::error::PRODUCT_BUNDLE_IDENTIFIER must be exactly '${EXPECTED_BUNDLE_ID}' across all configs (got: $distinct_ids). Bundle id drift breaks installed-app upgrades."
            exit 1
          fi

          # 7. Sparkle public key must still be in Info.plist. Installed apps
          #    verify update signatures against SUPublicEDKey; if the key is
          #    removed or rotated server-side without matching a key the
          #    installed app trusts, auto-update breaks silently.
          #
          #    Use PlistBuddy so the check matches an actual plist key, not
          #    text inside an XML comment.
          if ! /usr/libexec/PlistBuddy -c "Print :SUPublicEDKey" \
            packages/owletto/apps/mac/Lobu/Info.plist >/dev/null 2>&1; then
            echo "::error::SUPublicEDKey missing from Info.plist — installed apps cannot verify updates"
            exit 1
          fi

      - name: Resolve version
        id: v
        run: echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"

      - name: Detect signing mode
        id: mode
        env:
          CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
        run: |
          if [ -n "$CERT_P12_BASE64" ]; then
            echo "signed=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Building a SIGNED + notarized DMG."
          else
            echo "signed=false" >> "$GITHUB_OUTPUT"
            echo "::warning::APPLE_CERT_P12_BASE64 not set — building an UNSIGNED DMG (Gatekeeper warns on first open). Add the signing secrets to get a notarized build."
          fi

      # ── SIGNED path: import the Developer ID cert into an ephemeral keychain ──
      - name: Import signing certificate
        if: steps.mode.outputs.signed == 'true'
        env:
          CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          echo "$CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"

      - name: Archive (signed)
        if: steps.mode.outputs.signed == 'true'
        run: |
          xcodebuild \
            -project packages/owletto/apps/mac/Lobu.xcodeproj -scheme Lobu -configuration Release \
            -archivePath "$RUNNER_TEMP/Lobu.xcarchive" archive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            ENABLE_HARDENED_RUNTIME=YES \
            MARKETING_VERSION="${{ steps.v.outputs.version }}"

      - name: Archive (unsigned, ad-hoc)
        if: steps.mode.outputs.signed != 'true'
        run: |
          xcodebuild \
            -project packages/owletto/apps/mac/Lobu.xcodeproj -scheme Lobu -configuration Release \
            -archivePath "$RUNNER_TEMP/Lobu.xcarchive" archive \
            CODE_SIGNING_ALLOWED=NO \
            MARKETING_VERSION="${{ steps.v.outputs.version }}"
          # arm64 apps must carry at least an ad-hoc signature to launch at all;
          # this also lets users do right-click → Open past "unidentified
          # developer". A real Developer ID + notarization removes that prompt.
          codesign --force --deep --sign - "$RUNNER_TEMP/Lobu.xcarchive/Products/Applications/Owletto.app"

      - name: Build DMG
        run: |
          APP="$RUNNER_TEMP/Lobu.xcarchive/Products/Applications/Owletto.app"
          test -d "$APP" || { echo "::error::Owletto.app missing from archive"; exit 1; }
          STAGE="$RUNNER_TEMP/dmg-stage"; mkdir -p "$STAGE"; cp -R "$APP" "$STAGE/"
          brew install create-dmg
          # create-dmg can exit non-zero on cosmetic AppleScript hiccups while
          # still producing the image, so verify the artifact instead of $?.
          create-dmg \
            --volname "Owletto" --window-size 540 380 --icon-size 100 \
            --icon "Owletto.app" 140 190 --app-drop-link 400 190 \
            "$RUNNER_TEMP/Owletto.dmg" "$STAGE" || true
          test -f "$RUNNER_TEMP/Owletto.dmg" || { echo "::error::DMG was not created"; exit 1; }

      - name: Notarize and staple
        if: steps.mode.outputs.signed == 'true'
        run: |
          xcrun notarytool submit "$RUNNER_TEMP/Owletto.dmg" \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --team-id "${{ secrets.APPLE_TEAM_ID }}" \
            --password "${{ secrets.APPLE_APP_PASSWORD }}" \
            --wait
          xcrun stapler staple "$RUNNER_TEMP/Owletto.dmg"

      - name: Attach DMG to the release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: lobu-v${{ steps.v.outputs.version }}
          files: ${{ runner.temp }}/Owletto.dmg
          fail_on_unmatched_files: true

      - name: Sign update with Sparkle and publish appcast
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          # `set +x` around secret handling — GitHub Actions masks known
          # secret strings in logs, but we don't want correctness to rely on
          # that masking. Trace only the non-secret commands (curl, tar, git
          # clone-with-token-URL is also non-traced for the same reason).
          set -e
          if [ -z "$SPARKLE_ED_PRIVATE_KEY" ]; then
            echo "::error::SPARKLE_ED_PRIVATE_KEY not set — add the 64-byte base64 Sparkle Ed25519 private key as a repo secret."
            exit 1
          fi
          VERSION="${{ steps.v.outputs.version }}"
          DMG="$RUNNER_TEMP/Owletto.dmg"

          # Fetch Sparkle's binary tools (sign_update). The SPM artifact bundle
          # ships them under `bin/`, but the Sparkle GitHub release tarball is
          # the easier source from CI.
          set -x
          SPARKLE_VERSION="2.9.1"
          curl -fsSL -o "$RUNNER_TEMP/sparkle.tar.xz" \
            "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz"
          mkdir -p "$RUNNER_TEMP/sparkle" && tar -xJf "$RUNNER_TEMP/sparkle.tar.xz" -C "$RUNNER_TEMP/sparkle"
          SIGN_UPDATE="$RUNNER_TEMP/sparkle/bin/sign_update"
          test -x "$SIGN_UPDATE" || { echo "::error::sign_update missing from Sparkle archive"; exit 1; }
          set +x

          # Secret handling: drop xtrace so the key file path + sign_update
          # invocation aren't echoed to the log next to the (masked) secret.
          KEY_FILE="$RUNNER_TEMP/sparkle_ed_private.b64"
          printf '%s' "$SPARKLE_ED_PRIVATE_KEY" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          SIGN_OUTPUT=$("$SIGN_UPDATE" -f "$KEY_FILE" "$DMG")
          rm -f "$KEY_FILE"
          echo "sign_update output: $SIGN_OUTPUT"

          set -x
          ED_SIG=$(echo "$SIGN_OUTPUT" | sed -E 's/.*sparkle:edSignature="([^"]+)".*/\1/')
          LENGTH=$(echo "$SIGN_OUTPUT" | sed -E 's/.*length="([^"]+)".*/\1/')
          test -n "$ED_SIG" && test -n "$LENGTH" || { echo "::error::failed to parse sign_update output"; exit 1; }
          set +x

          # Clone gh-pages — token-bearing URL must not be traced.
          git clone --depth 1 --branch gh-pages \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            "$RUNNER_TEMP/ghpages"

          set -x
          python3 scripts/sparkle/update-appcast.py "$RUNNER_TEMP/ghpages/appcast.xml" \
            --version "$VERSION" \
            --build "$VERSION" \
            --dmg-url "https://github.com/${{ github.repository }}/releases/download/lobu-v${VERSION}/Owletto.dmg" \
            --signature "$ED_SIG" \
            --length "$LENGTH" \
            --release-notes "https://github.com/${{ github.repository }}/releases/tag/lobu-v${VERSION}" \
            --min-system-version 14.0

          cd "$RUNNER_TEMP/ghpages"
          git config user.name "lobu-bot"
          git config user.email "bot@lobu.ai"
          git add appcast.xml
          git diff --cached --quiet || git commit -m "appcast: lobu ${VERSION}"
          git push origin gh-pages
