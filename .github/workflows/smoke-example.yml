name: Smoke Example

# The smoke job spins up the full careops example stack (gateway image
# build, docker compose up, eval CLI run) and takes ~3 minutes per run.
# Per-PR execution was the dominant CI cost and frequently flaky on
# dependency PRs, so it now runs:
#   - daily at 06:00 UTC against `main`
#   - on every push to `main` (post-merge regression catch)
#   - on demand via the Actions UI (workflow_dispatch)
on:
  schedule:
    - cron: "0 6 * * *"
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to run smoke against"
        required: false
        default: "main"

jobs:
  smoke-example:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: ./.github/actions/setup-submodule
        with:
          deploy-key: ${{ secrets.OWLETTO_WEB_DEPLOY_KEY }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Require GEMINI_API_KEY secret
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "GEMINI_API_KEY secret is not configured"
            exit 1
          fi

      - name: Install dependencies
        run: bun install

      - name: Build CLI
        run: |
          cd packages/core && bun run build
          cd ../cli && bun run build

      - name: Build local gateway image
        run: docker build -f docker/Dockerfile.gateway -t lobu-gateway:ci .

      - name: Create .env for example
        working-directory: examples/careops
        run: |
          cat > .env <<EOF
          ADMIN_PASSWORD=ci-eval-password
          ENCRYPTION_KEY=$(openssl rand -hex 32)
          GATEWAY_PORT=8081
          GEMINI_API_KEY=${GEMINI_API_KEY}
          EOF

      - name: Start stack
        working-directory: examples/careops
        run: |
          mkdir -p data && chmod 777 data
          # Use the gateway image built from this checkout and tame Redis
          # for ephemeral CI. GEMINI_API_KEY passthrough exists in
          # the base docker-compose.yml.
          cat > docker-compose.override.yml <<'YAML'
          services:
            redis:
              command: redis-server --maxmemory 256mb --maxmemory-policy noeviction --save "" --stop-writes-on-bgsave-error no --dir /tmp
            gateway:
              image: lobu-gateway:ci
              pull_policy: never
          YAML
          docker compose up -d
          echo "Waiting for gateway to be ready..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8081/health > /dev/null 2>&1; then
              echo "Gateway is ready"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "Gateway failed to start"
              docker compose logs gateway
              exit 1
            fi
            sleep 2
          done

      - name: Run smoke eval with local CLI
        working-directory: examples/careops
        env:
          ADMIN_PASSWORD: ci-eval-password
        run: node ../../packages/cli/bin/lobu.js eval smoke --ci --output eval-results.json

      - name: Gateway logs
        if: always()
        working-directory: examples/careops
        run: docker compose logs gateway 2>&1 | tail -100

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-eval-results-careops
          path: |
            examples/careops/eval-results.json
            examples/careops/agents/*/evals/evals-report.md

      - name: Print eval report
        if: always()
        working-directory: examples/careops
        run: |
          for report in agents/*/evals/evals-report.md; do
            if [ -f "$report" ]; then
              echo "## Eval Report: $report"
              cat "$report"
            fi
          done

      - name: Stop stack
        if: always()
        working-directory: examples/careops
        run: docker compose down
