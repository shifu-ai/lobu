name: CodeQL

# Static application security testing (SAST). The existing `security-tests.yml`
# runs a bespoke `git grep` banned-pattern scan plus curated unit suites — good
# for the specific WS1-WS9 invariants, but it cannot find *new* classes of bug
# (taint flows into SQL/`child_process`, unsafe deserialization, path traversal)
# the way dataflow analysis can. CodeQL fills that gap for an agent runtime that
# spawns subprocesses and proxies credentials.
#
# Findings land in the repo Security tab (code-scanning alerts), not as a hard
# PR gate, so this is additive and won't block the pipeline on day one. Promote
# specific queries to required once the baseline is triaged.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  schedule:
    # Weekly full scan catches advisories published after a PR merged.
    - cron: "27 4 * * 1"

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          # TS/JS is interpreted — no compiler step for CodeQL to observe.
          build-mode: none
          # `security-and-quality` adds maintainability queries on top of the
          # default security pack; drop to `security-extended` if the quality
          # noise is too high during triage.
          queries: security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"
