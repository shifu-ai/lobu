name: Codex Auto-Approve

# Bridges Codex's +1 reaction into a formal APPROVE review via a GitHub App.
#
# Codex only submits a formal review when it has suggestions; when it approves
# cleanly it leaves only a +1 reaction (which does not fire any workflow
# event). So we run on two triggers:
#   - pull_request_review: immediate response when Codex posts a review
#   - schedule:            sweep every 5 min to catch reaction-only approvals
on:
  pull_request_review:
    types: [submitted]
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to check for Codex approval"
        required: false
        type: number

permissions:
  contents: read

concurrency:
  group: codex-auto-approve-${{ github.event_name }}-${{ github.event.pull_request.number || inputs.pr_number || 'sweep' }}
  cancel-in-progress: false

jobs:
  approve:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Event-driven runs are gated to Codex authors. Scheduled sweeps and
    # manual dispatches always run.
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      github.event.review.user.login == 'chatgpt-codex-connector' ||
      github.event.review.user.login == 'chatgpt-codex-connector[bot]'
    steps:
      - name: Generate App token
        id: app
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.CODEX_APPROVER_APP_ID }}
          private-key: ${{ secrets.CODEX_APPROVER_PRIVATE_KEY }}

      - name: Approve PRs with Codex 👍
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
          REPO: ${{ github.repository }}
          EVENT: ${{ github.event_name }}
          EVENT_PR: ${{ github.event.pull_request.number }}
          INPUT_PR: ${{ inputs.pr_number }}
        run: |
          set -euo pipefail

          # Build the list of PR numbers to check based on the trigger.
          case "$EVENT" in
            pull_request_review)
              prs="$EVENT_PR"
              ;;
            workflow_dispatch)
              if [ -n "${INPUT_PR:-}" ]; then
                prs="$INPUT_PR"
              else
                prs=$(gh pr list --repo "$REPO" --state open --json number --jq '.[].number' | tr '\n' ' ')
              fi
              ;;
            schedule)
              prs=$(gh pr list --repo "$REPO" --state open --json number --jq '.[].number' | tr '\n' ' ')
              ;;
            *)
              echo "unsupported event $EVENT"
              exit 1
              ;;
          esac

          echo "Checking PRs: $prs"

          for pr in $prs; do
            [ -n "$pr" ] || continue
            echo "--- PR #$pr ---"

            already=$(gh api "repos/$REPO/pulls/$pr/reviews" \
              --jq '[.[] | select((.user.login | startswith("codex-approver")) and .state == "APPROVED")] | length')
            if [ "$already" -gt 0 ]; then
              echo "already approved by this app; skipping"
              continue
            fi

            # For pull_request_review we may race Codex's reaction, so retry briefly.
            # For schedule sweeps a single check is fine — the next cron catches late 👍s.
            attempts=1
            [ "$EVENT" = "pull_request_review" ] && attempts=10

            approved=0
            for i in $(seq 1 "$attempts"); do
              reacts=$(gh api "repos/$REPO/issues/$pr/reactions" \
                --jq '[.[] | select(.user.login == "chatgpt-codex-connector[bot]" and .content == "+1")] | length')
              if [ "$reacts" -gt 0 ]; then
                gh api -X POST "repos/$REPO/pulls/$pr/reviews" \
                  -f event=APPROVE \
                  -f body="Auto-approved: Codex left a 👍 reaction (no suggestions)." > /dev/null
                echo "approved"
                approved=1
                break
              fi
              [ "$i" -lt "$attempts" ] && sleep 6 || true
            done

            [ "$approved" -eq 0 ] && echo "no 👍 yet"
          done
